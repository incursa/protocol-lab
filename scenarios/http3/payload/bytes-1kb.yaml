schemaVersion: "1.0"
id: http3.payload.bytes.1kb
title: HTTP/3 Bytes 1KB
name: HTTP/3 Bytes 1KB
family: http.application
description: Validate and benchmark a deterministic 1KB byte payload downloaded from an HTTP/3 server endpoint.
status: stable
kind: workload
layer: application
protocol: h3
roles:
  - server
requires:
  capabilities:
    - http.server
  protocols:
    - h3
  roles:
    - server
trafficShape: download
implementationRole: server
requiredCapabilities:
  - httpBytes
endpoint:
  method: GET
  path: /bytes/1024
  query: {}
  requestHeaders: {}
  requestBodyGeneration: none
  expectedStatus: 200
  expectedHeaders:
    content-type: application/octet-stream
  expectedBodyRule: deterministicBytes
  expectedBodySize: 1024
validation:
  required: true
  checks:
    - status
    - content-type
    - body-size
    - deterministic-bytes
    - protocol:h3
  http:
    expectedStatus: 200
    expectedProtocol: h3
    expectedBody: <deterministicBytes>
benchmark:
  warmupSeconds: 5
  durationSeconds: 30
  repetitions: 1
  connections:
    - 1
  streamsPerConnection:
    - 1
benchmarkCompat:
  compatibleLoadShapes:
    - fixed-path-request-response
    - smoke
    - regression
    - comparison
  primaryMetrics:
    - requestsPerSecond
    - latencyP50
    - latencyP95
    - latencyP99
    - errorRate
    - bytesReceived
  notes: Compatible with HTTP/3 download load profiles when the selected executor preserves the fixed GET /bytes/1024 request and validates status, content type, payload size, deterministic bytes, and exact H3 protocol proof before accepting benchmark metrics.
artifacts:
  required:
    - validation.json
    - result.json
    - load-generator.stdout.txt
    - load-generator.stderr.txt
  optional:
    - response-sample.bin
    - protocol-diagnostic-artifact
    - counters
networkProfile: clean
requiredMetrics:
  - requestsPerSecond
  - bytesReceived
artifactRequirements:
  - load-generator.stdout.txt
  - load-generator.stderr.txt
tags:
  - phase2
  - http
  - h3
  - http3
  - payload
