schemaVersion: "1.0"
id: http3.upload.echo.64kb
title: HTTP/3 Upload Echo 64KB
name: HTTP/3 Upload Echo 64KB
family: http.application
description: Validate and benchmark echoing a 64KB request body.
status: stable
kind: workload
layer: application
protocol: h3
roles:
  - server
requires:
  capabilities:
    - http.server
  protocols:
    - h3
  roles:
    - server
trafficShape: upload
implementationRole: server
requiredCapabilities:
  - httpUpload
endpoint:
  method: POST
  path: /echo
  query: {}
  requestHeaders: {}
  requestBodyGeneration: deterministic-bytes:65536
  expectedStatus: 200
  expectedHeaders:
    content-type: application/octet-stream
  expectedBodyRule: requestBodyEcho
  expectedBodySize: 65536
validation:
  required: true
  checks:
    - status
    - content-type
    - echo
    - protocol:h3
  http:
    expectedStatus: 200
    expectedProtocol: h3
    expectedBody: <requestBodyEcho>
benchmark:
  warmupSeconds: 5
  durationSeconds: 30
  repetitions: 1
  connections:
    - 1
  streamsPerConnection:
    - 1
benchmarkCompat:
  compatibleLoadShapes:
    - fixed-path-request-response
  primaryMetrics:
    - requestsPerSecond
    - latencyP50
    - latencyP95
    - latencyP99
    - errorRate
artifacts:
  required:
    - validation.json
    - result.json
  optional:
    - protocol-diagnostic-artifact
    - counters
networkProfile: clean
requiredMetrics:
  - requestsPerSecond
  - bytesSent
  - bytesReceived
artifactRequirements:
  - load-generator.stdout.txt
  - load-generator.stderr.txt
tags:
  - phase2
  - http
  - h3
  - http3
  - upload
