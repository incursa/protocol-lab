id: fixture-kestrel-adapter-v1
name: Fixture Kestrel Adapter v1
description: Deterministic adapter-backed Kestrel target used to prove the real adapter control plane through the runner.
image: ""
targetKind: process
targetContract: adapter-v1
executable: dotnet
project: ../../../../src/Incursa.ProtocolLab.Adapters.Kestrel/Incursa.ProtocolLab.Adapters.Kestrel.csproj
workingDirectory: .
dockerfile: ""
buildContext: .
containerName: ""
dockerNetwork: ""
dockerNetworkMode: published-port
dockerBaseUrl: http://127.0.0.1:53171
baseUrl: http://127.0.0.1:53171
adapterControlPlaneBaseUrl: http://127.0.0.1:53171
certificateMode: none
roles:
  - server
supportedProtocols:
  - h1
  - h2
  - h3
supportedWorkloadFamilies:
  - fixture.kestrel
ports:
  - name: control-plane
    containerPort: 53171
    hostPort: 53171
    protocol: tcp
environment:
  ASPNETCORE_URLS: http://127.0.0.1:53171
  PROTOCOL_LAB_KESTREL_READINESS_TIMEOUT_SECONDS: "10"
  PROTOCOL_LAB_KESTREL_HTTP_TIMEOUT_SECONDS: "5"
dockerEnvironment: {}
commandArguments: []
readinessCheck:
  type: http
  url: /protocol-lab/adapter/v1/health
  timeoutSeconds: 10
shutdownBehavior: process-exit
capabilities:
  - httpPlaintext
  - httpJson
  - httpStatus
  - httpBytes
  - httpStreaming
  - httpUpload
  - httpHeaders
artifactExports:
  - server.stdout.txt
  - server.stderr.txt
qlogSupport: false
sslKeyLogSupport: false
notes: Fixture-backed adapter control plane for the real Kestrel adapter. The runner starts the adapter process, the adapter launches the benchmark server as a child process, and the protocol endpoint stays separate from the control-plane URL.
