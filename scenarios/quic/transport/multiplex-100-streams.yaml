schemaVersion: "1.0"
id: quic.transport.multiplex.100x64kb
title: QUIC Multiplex 100x64KB
name: QUIC Multiplex 100x64KB
family: quic.transport
description: Validate 100 concurrent 64KB QUIC streams as a transport scenario independent of HTTP/3 application semantics.
status: stable
kind: protocolValidation
layer: transport
protocol: quic
roles:
  - server
requires:
  capabilities:
    - quic.server
  protocols:
    - quic
  roles:
    - server
trafficShape: bidirectional-stream
implementationRole: server
requiredCapabilities:
  - quicTransport
  - quicStreams
  - quicMultiplexing
quicTransport:
  behavior: multiplex-streams
  connectionCount: 1
  streamType: bidirectional
  streamCount: 100
  payloadSizeBytes: 65536
  payloadDirection: bidirectional
  openPattern: concurrent
  expectedBytes: 13107200
validation:
  required: true
  checks:
    - quic-transport-metrics
    - bytes-sent-received-match-expected
    - completed-streams-match-expected
    - zero-timeouts-and-errors
    - concurrent-streams-complete
    - protocol:quic
benchmark:
  warmupSeconds: 5
  durationSeconds: 30
  repetitions: 1
  connections:
    - 1
    - 4
    - 16
    - 32
    - 64
    - 128
  streamsPerConnection:
    - 100
benchmarkCompat:
  compatibleLoadShapes:
    - quic-stream
    - smoke
    - regression
    - comparison
  primaryMetrics:
    - bytesPerSecond
    - streamsPerSecond
    - maxActiveStreams
    - errorRate
artifacts:
  required:
    - validation.json
    - result.json
  optional:
    - protocol-diagnostic-artifact
    - counters
networkProfile: clean
requiredMetrics:
  - quic.stream.maxActiveStreams
  - quic.stream.completedStreams
artifactRequirements:
  - load-generator.stdout.txt
  - load-generator.stderr.txt
  - protocol-diagnostic-unavailable-note
tags:
  - phase6
  - quic
  - multiplexing
