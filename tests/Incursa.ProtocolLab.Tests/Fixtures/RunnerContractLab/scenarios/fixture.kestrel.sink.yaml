id: fixture.kestrel.sink
name: Fixture Kestrel Sink
family: fixture.kestrel
version: 1.0
description: Validates the request-body sink endpoint.
protocol: h1
implementationRole: server
requiredCapabilities:
  - httpUpload
endpoint:
  method: POST
  path: /sink
  query: {}
  requestHeaders:
    content-type: application/octet-stream
  requestBodyGeneration: deterministic-bytes:16
  expectedStatus: 200
  expectedHeaders:
    content-type: application/json
  expectedBodyRule: jsonBytesRead
validation:
  required: true
  checks:
    - status
    - content-type
    - body
benchmark:
  warmupSeconds: 0
  durationSeconds: 1
  repetitions: 1
  connections:
    - 1
  streamsPerConnection:
    - 1
networkProfile: clean
requiredMetrics:
  - requestsPerSecond
artifactRequirements:
  - result.json
  - validation.json
tags:
  - fixture
  - kestrel
  - adapter
