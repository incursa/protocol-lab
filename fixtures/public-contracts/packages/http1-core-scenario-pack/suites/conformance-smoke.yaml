id: conformance-smoke
name: HTTP/1 Conformance Smoke
description: Fast package-neutral HTTP/1 behavior validation for the core plaintext, JSON, and 1KB payload test cases.
purpose: conformance
resultKind: conformance
loadProfileId: smoke
scenarios:
  - http.core.plaintext
  - http.core.json
  - http.payload.bytes.1kb
protocol: h1
defaults:
  durationSeconds: 5
  warmupSeconds: 1
  repetitions: 1
  connections: 1
  streamsPerConnection: 1
counterCapture:
  enabledByDefault: false
  tool: ""
notes: Conformance answers whether behavior is valid. Latency or throughput may be recorded for diagnostics, but slow valid behavior remains conformance-passing.
