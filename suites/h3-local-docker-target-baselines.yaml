id: h3-local-docker-target-baselines
name: ProtocolLab local HTTP/3 Docker target baseline suite
description: Local shared-network Docker h2load comparison suite for Kestrel, Incursa, Caddy, and nginx HTTP/3 targets.
targetMode: docker
targetNetworkMode: shared-docker-network
implementations:
  - kestrel-http3
  - incursa-http3
  - caddy-http3
  - nginx-http3
scenarios:
  - http.core.plaintext
  - http.core.json
protocol: h3
loadTools:
  - id: h2load
    mode: docker
defaults:
  durationSeconds: 5
  warmupSeconds: 1
  repetitions: 1
  connections: 16
  streamsPerConnection: 10
notes: Local comparison inputs only. nginx is optional Docker evidence and requires scripts/build/Build-NginxBenchServerImage.ps1 HTTP/3 module proof before use. Results remain non-publishable local Docker evidence.
