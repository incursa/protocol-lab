id: fixture.quic.unsupported
name: Fixture QUIC Unsupported
family: fixture.quic
version: 1.0
description: Models a raw QUIC scenario that the adapter reports as unsupported.
protocol: quic
implementationRole: server
requiredCapabilities:
  - quicTransport
  - quicDatagram
quicTransport:
  behavior: datagram-unsupported
  connectionCount: 1
  streamType: none
  streamCount: 0
  payloadDirection: none
  openPattern: sequential
  expectedBytes: 0
validation:
  required: true
  checks:
    - fixture
benchmark:
  warmupSeconds: 0
  durationSeconds: 1
  repetitions: 1
  connections:
    - 1
  streamsPerConnection:
    - 0
networkProfile: clean
requiredMetrics:
  - fixture.quic.unsupported
artifactRequirements:
  - result.json
  - validation.json
tags:
  - fixture
  - quic
  - foundation
  - unsupported
