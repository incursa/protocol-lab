schemaVersion: "1.0"
id: webtransport.session-bidi-echo
title: WebTransport Session Bidi Echo
name: WebTransport Session Bidi Echo
family: webtransport
description: Placeholder for a future WebTransport bidirectional stream echo contract family. Support is not implied by this public catalog entry.
status: placeholder
kind: protocolValidation
layer: application
protocol: h3
roles:
  - server
requires:
  capabilities:
    - webtransport.server
  protocols:
    - h3
  roles:
    - server
trafficShape: bidirectional-stream
implementationRole: server
requiredCapabilities:
  - webtransport
  - webtransportBidiStreams
webTransport:
  behavior: session-bidi-echo
  sessionPath: /webtransport/echo
  streamType: bidirectional
  streamCount: 1
  payloadSizeBytes: 65536
  payloadDirection: bidirectional
validation:
  required: false
  checks:
    - session-established
    - bidirectional-stream-echoes-payload
    - protocol:h3
benchmark:
  warmupSeconds: 5
  durationSeconds: 30
  repetitions: 1
  connections:
    - 1
  streamsPerConnection:
    - 1
benchmarkCompat:
  compatibleLoadShapes:
    - fixed-path-request-response
  primaryMetrics:
    - requestsPerSecond
    - latencyP50
    - latencyP95
    - latencyP99
    - errorRate
artifacts:
  required:
    - validation.json
    - result.json
  optional:
    - protocol-diagnostic-artifact
    - counters
networkProfile: clean
requiredMetrics:
  - webtransport.session.durationMs
  - webtransport.stream.bytesEchoed
artifactRequirements:
  - load-generator.stdout.txt
  - load-generator.stderr.txt
  - protocol-diagnostic-artifact
tags:
  - phase8
  - webtransport
  - future-family
  - placeholder
