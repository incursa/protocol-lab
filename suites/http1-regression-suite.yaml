id: http1-regression-suite
name: ProtocolLab HTTP/1 regression suite
description: Profile-specific HTTP/1 application selector for the regression load profile.
purpose: regression
resultKind: regression
loadProfileId: http1-regression
scenarios:
  - http1.core.plaintext
  - http1.core.json
  - http1.payload.bytes.1kb
protocol: h1
defaults:
  durationSeconds: 15
  warmupSeconds: 5
  repetitions: 2
  connections: 16
  streamsPerConnection: 10
counterCapture:
  enabledByDefault: false
  tool: ""
notes: This suite selects existing public HTTP/1 scenarios with the protocol-specific http1-regression load profile; it does not imply a required runner or load generator.
tags:
  - http1
  - regression
