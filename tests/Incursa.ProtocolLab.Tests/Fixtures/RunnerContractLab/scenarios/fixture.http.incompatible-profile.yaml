id: fixture.http.incompatible-profile
name: Fixture HTTP Incompatible Profile
family: fixture.http
description: Uses a missing network profile to prove incompatible classification.
protocol: h1
implementationRole: server
requiredCapabilities:
  - fixtureHttp
endpoint:
  method: GET
  path: /ok
  expectedStatus: 200
  expectedBodyRule: exact
  expectedBody: fixture-ok
validation:
  required: true
benchmark:
  warmupSeconds: 0
  durationSeconds: 1
  repetitions: 1
  connections:
    - 1
  streamsPerConnection:
    - 1
networkProfile: missing-fixture-profile
requiredMetrics:
  - requestsPerSecond
artifactRequirements:
  - result.json
  - validation.json
tags:
  - fixture
