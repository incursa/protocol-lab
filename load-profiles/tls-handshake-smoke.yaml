schemaVersion: protocol-lab.load-profile.v1
id: tls-handshake-smoke
title: TLS 1.3 Full Handshake Smoke
status: experimental
purpose: smoke
description: Fast single-operation TLS 1.3 full-handshake validity profile with zero application data; not comparison evidence.
durationSeconds: 5
warmupSeconds: 1
repetitions: 1
tls:
  connections: 1
  concurrency: 1
  handshakesPerConnection: 1
  applicationDataBytes: 0
  connectionTimeoutSeconds: 5
evidence: {minimumTier: smoke, publishable: false}
artifacts:
  required: [load.stdout.log, load.stderr.log, validation.json, protocol-proof.json, tls-negotiation.json, tls-topology.json, result.json]
  optional: [connection-and-handshake-latency.json, target-telemetry.json, load-generator-telemetry.json]
