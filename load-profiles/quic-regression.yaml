# Load Profile Contract v1
schemaVersion: protocol-lab.load-profile.v1

id: quic-regression
title: QUIC Regression
status: stable
purpose: regression

description: >
  Moderate protocol-specific profile for implementation-owned regression evidence. Longer than smoke and not publishable benchmark evidence.

durationSeconds: 15
warmupSeconds: 5
repetitions: 2

quic:
  connections: 8
  streamsPerConnection: 8
  streamBytes: 65536
  connectionTimeoutSeconds: 15
  idleTimeoutSeconds: 15

evidence:
  minimumTier: regression
  publishable: false

artifacts:
  required:
    - load.stdout.log
    - load.stderr.log
    - validation.json
    - result.json
  optional:
    - counters
