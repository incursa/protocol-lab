              for error in suite_validator.iter_errors(data):
                  errors.append(f"{rel(path)}: suite schema: {error.message}")
              suite_id = data.get("id")
              root_suite_ids[suite_id] = path
              load_profile_path = load_profile_ids.get(data.get("loadProfileId"))
              if load_profile_path is None:
                  errors.append(f"{rel(path)}: suite loadProfileId {data.get('loadProfileId')} does not resolve")
              load_profile = yaml_docs.get(load_profile_path, {}) if load_profile_path is not None else {}
              for scenario_id in data.get("scenarios") or []:
                  scenario_path = scenario_ids.get(scenario_id)
                  if not scenario_path:
                      errors.append(f"{rel(path)}: suite scenario {scenario_id} does not resolve in root scenarios")
                      continue
                  scenario_protocol = yaml_docs[scenario_path].get("protocol")
                  if data.get("protocol") != scenario_protocol:
                      errors.append(f"{rel(path)}: suite protocol {data.get('protocol')} mismatches {scenario_id} protocol {scenario_protocol}")
                  scenario_grpc = yaml_docs[scenario_path].get("grpc", {})
                  load_grpc = load_profile.get("grpc", {}) if isinstance(load_profile, dict) else {}
                  if scenario_grpc.get("connectionLifecycle") == "new-channel-per-operation" and load_grpc.get("channelReuse") != "churn":
                      errors.append(f"{rel(path)}: new-channel scenario {scenario_id} requires gRPC channelReuse churn")
                  if scenario_grpc.get("connectionLifecycle") == "pre-established-channel" and load_grpc and load_grpc.get("channelReuse") != "reuse":
                      errors.append(f"{rel(path)}: pre-established scenario {scenario_id} requires gRPC channelReuse reuse")

          for suite_path, data in yaml_docs.items():
              if not isinstance(data, dict):
