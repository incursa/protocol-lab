# Load Profile Contract v1
schemaVersion: protocol-lab.load-profile.v1

id: quic-smoke
title: QUIC Smoke
status: stable
purpose: smoke

description: >
  Minimal protocol-specific smoke test to verify basic endpoint and protocol function. Not intended for benchmark comparison.

durationSeconds: 5
warmupSeconds: 1
repetitions: 1

quic:
  connections: 1
  streamsPerConnection: 1
  streamBytes: 1024
  connectionTimeoutSeconds: 5
  idleTimeoutSeconds: 5

evidence:
  minimumTier: smoke
  publishable: false

artifacts:
  required:
    - load.stdout.log
    - load.stderr.log
    - validation.json
  optional:
    []
