id: fixture.quic.handshake
name: Fixture QUIC Handshake
family: fixture.quic
version: 1.0
description: Fixture-only raw QUIC handshake validation through the adapter-backed runner flow.
protocol: quic
implementationRole: server
requiredCapabilities:
  - quicTransport
  - quicHandshake
quicTransport:
  behavior: handshake-fixture
  connectionCount: 1
  streamType: none
  streamCount: 0
  payloadDirection: none
  openPattern: sequential
  expectedBytes: 0
validation:
  required: true
  checks:
    - fixture
benchmark:
  warmupSeconds: 0
  durationSeconds: 1
  repetitions: 1
  connections:
    - 1
  streamsPerConnection:
    - 0
networkProfile: clean
requiredMetrics:
  - fixture.quic.handshake
artifactRequirements:
  - result.json
  - validation.json
tags:
  - fixture
  - quic
  - foundation
