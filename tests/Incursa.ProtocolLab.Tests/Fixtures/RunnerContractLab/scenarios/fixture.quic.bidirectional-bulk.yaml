id: fixture.quic.bidirectional-bulk
name: Fixture QUIC Bidirectional Bulk
family: fixture.quic
version: 1.0
description: Fixture-only raw QUIC bidirectional bulk stream send through the adapter-backed runner flow.
protocol: quic
implementationRole: server
requiredCapabilities:
  - quicTransport
  - quicStreams
quicTransport:
  behavior: bidirectional-bulk-fixture
  connectionCount: 1
  streamType: bidirectional
  streamCount: 16
  payloadSizeBytes: 65536
  payloadDirection: bidirectional
  openPattern: concurrent
  expectedBytes: 2097152
validation:
  required: true
  checks:
    - fixture
benchmark:
  warmupSeconds: 0
  durationSeconds: 1
  repetitions: 1
  connections:
    - 1
  streamsPerConnection:
    - 16
networkProfile: clean
requiredMetrics:
  - fixture.quic.throughput
artifactRequirements:
  - result.json
  - validation.json
tags:
  - fixture
  - quic
  - foundation
