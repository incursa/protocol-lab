# Load Tool Contract v1
schemaVersion: protocol-lab.load-tool.v1

id: managed-httpclient-h3-load
title: Managed HttpClient HTTP/3 Load
name: Managed HttpClient HTTP/3 Load
description: ProtocolLab managed local-lab HTTP/3 load generator using .NET HttpClient with exact HTTP/3 version policy.
kind: managed
category: managed-lab

supports:
  protocols:
    - h3
  trafficShapes:
    - request-response
  roles:
    - client

metrics:
  primary:
    - requestsPerSecond
    - latencyP50
    - latencyP95
    - latencyP99
    - latencyMean
    - throughputBytesPerSecond
    - errorRate
  secondary:
    - bytesRead
    - bytesWritten
    - latencyP75
    - latencyP90
    - latencyMin
    - latencyMax
    - responseVersionFailures
    - statusCodeCounts

execution:
  process:
    executable: ""
    defaultArguments: []
    versionCommand: []
    availabilityCheck: managed-runtime

parser:
  type: managed-httpclient-h3-json
  id: managed-httpclient-h3-json
  preservesRawOutput: true

artifacts:
  required:
    - load.stdout.log
    - load.stderr.log
  optional:
    - load.metrics.json

purposes:
  - validation
  - benchmark

limitations:
  - Does not provide h2load-equivalent connection or stream control
  - Uses concurrency as primary control, not exact connections/streamsPerConnection
  - Results are local lab measurements, not external-reference benchmarks

# Legacy fields
supportedProtocols:
  - h3
supportedScenarioFamilies:
  - http.application
executable: ""
dockerImage: ""
defaultArguments: []
versionCommand: []
availabilityCheck: managed-runtime
outputParserId: managed-httpclient-h3-json
notes: Runs inside ProtocolLab as a local lab H3 load generator. It requests HTTP/3 exactly and rejects fallback, but it does not provide h2load-equivalent connection or stream control.
