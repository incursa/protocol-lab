id: h3-local-docker-target-nginx
name: ProtocolLab local nginx HTTP/3 Docker target suite
description: Local shared-network Docker h2load suite for the optional nginx HTTP/3 target.
targetMode: docker
targetNetworkMode: shared-docker-network
implementations:
  - nginx-http3
scenarios:
  - http.core.plaintext
  - http.core.json
protocol: h3
loadTools:
  - id: h2load
    mode: docker
defaults:
  durationSeconds: 5
  warmupSeconds: 1
  repetitions: 1
  connections: 16
  streamsPerConnection: 10
dockerResourceLimits:
  target:
    cpus: "2"
    memory: 1g
  loadTool:
    cpus: "2"
    memory: 1g
notes: Build incursa/protocol-lab-nginx-bench-server:local with scripts/build/Build-NginxBenchServerImage.ps1 before running. The suite uses a generated shared Docker network, requires nginx -V HTTP/3 module proof, and routes h2load with --connect-to nginx-http3:8446 plus SNI localhost.
