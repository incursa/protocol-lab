schemaVersion: "1.0"
id: masque.connect-udp-tunnel
title: MASQUE CONNECT-UDP Tunnel
name: MASQUE CONNECT-UDP Tunnel
family: masque
description: Placeholder for a future MASQUE CONNECT-UDP tunnel contract family. Support is not implied by this public catalog entry.
status: placeholder
kind: protocolValidation
layer: application
protocol: h3
roles:
  - server
requires:
  capabilities:
    - masque.server
  protocols:
    - h3
  roles:
    - server
trafficShape: bidirectional-stream
implementationRole: server
requiredCapabilities:
  - masque
  - masqueConnectUdp
masque:
  behavior: connect-udp-tunnel
  tunnelMode: connect-udp
  targetAuthority: example.invalid:443
  datagramPolicy: required
validation:
  required: false
  checks:
    - tunnel-established
    - datagrams-forwarded
    - protocol:h3
benchmark:
  warmupSeconds: 5
  durationSeconds: 30
  repetitions: 1
  connections:
    - 1
  streamsPerConnection:
    - 1
benchmarkCompat:
  compatibleLoadShapes:
    - fixed-path-request-response
  primaryMetrics:
    - requestsPerSecond
    - latencyP50
    - latencyP95
    - latencyP99
    - errorRate
artifacts:
  required:
    - validation.json
    - result.json
  optional:
    - protocol-diagnostic-artifact
    - counters
networkProfile: clean
requiredMetrics:
  - masque.tunnel.setupDurationMs
  - masque.datagram.forwardedCount
artifactRequirements:
  - load-generator.stdout.txt
  - load-generator.stderr.txt
  - protocol-diagnostic-artifact
tags:
  - phase8
  - masque
  - future-family
  - placeholder
