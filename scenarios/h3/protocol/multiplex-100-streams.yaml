schemaVersion: "1.0"
title: H3 Multiplex 100 Streams
status: stable
kind: protocolValidation
layer: protocol
roles:
  - server
requires:
  capabilities:
    - h3.server
    - quic.server
  protocols:
    - h3
  roles:
    - server
trafficShape: bidirectional-stream
id: h3.protocol.multiplex-100-streams
name: H3 Multiplex 100 Streams
family: h3.protocol
description: Validate and benchmark HTTP/3 multiplexing across 100 concurrent request streams once an H3 protocol validator and load generator exist.
protocol: h3
implementationRole: server
requiredCapabilities:
  - h3Protocol
  - h3Multiplexing
h3Protocol:
  behavior: multiplex-request-streams
  requestPath: /bytes/1024
  concurrentRequestStreams: 100
  expectedFrameTypes:
    - headers
    - data
validation:
  required: true
  checks:
    - unsupported-until-h3-validator
    - stream-concurrency-observable
benchmark:
  warmupSeconds: 5
  durationSeconds: 30
  repetitions: 1
  connections:
    - 1
  streamsPerConnection:
    - 100
benchmarkCompat:
  compatibleLoadShapes:
    - fixed-path-request-response
  primaryMetrics:
    - requestsPerSecond
    - latencyP50
    - latencyP95
    - latencyP99
    - errorRate
artifacts:
  required:
    - validation.json
    - result.json
  optional:
    - protocol-diagnostic-artifact
    - counters
networkProfile: clean
requiredMetrics:
  - h3.stream.concurrentRequests
  - h3.stream.completedRequests
  - h3.stream.maxActiveStreams
artifactRequirements:
  - load-generator.stdout.txt
  - load-generator.stderr.txt
  - protocol-diagnostic-artifact
tags:
  - phase5
  - h3
  - multiplexing
