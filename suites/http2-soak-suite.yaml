id: http2-soak-suite
name: ProtocolLab HTTP/2 soak suite
description: Profile-specific HTTP/2 application selector for the soak load profile.
purpose: soak
resultKind: soak
loadProfileId: http2-soak
scenarios:
  - http2.core.plaintext
  - http2.core.json
  - http2.streaming.response
protocol: h2
defaults:
  durationSeconds: 3600
  warmupSeconds: 60
  repetitions: 1
  connections: 16
  streamsPerConnection: 16
counterCapture:
  enabledByDefault: false
  tool: ""
notes: This suite selects existing public HTTP/2 scenarios with the protocol-specific http2-soak load profile; it does not imply a required runner or load generator.
tags:
  - http2
  - soak
