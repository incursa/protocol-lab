schemaVersion: "1.0"
id: http.core.plaintext
title: HTTP Plaintext
name: HTTP Plaintext
family: http.application
description: Validate and benchmark a small plaintext HTTP response.
status: stable
kind: workload
layer: application
protocol: h3
roles:
  - server
requires:
  capabilities:
    - http.server
    - httpPlaintext
  protocols:
    - h1
    - h2
    - h3
  roles:
    - server
trafficShape: request-response
implementationRole: server
requiredCapabilities:
  - httpPlaintext
endpoint:
  method: GET
  path: /plaintext
  query: {}
  requestHeaders: {}
  expectedStatus: 200
  expectedHeaders:
    content-type: text/plain
  expectedBodyRule: exact
  expectedBody: Hello, World!
  expectedBodySize: 13
validation:
  required: true
  checks:
    - status
    - content-type
    - body
  http:
    expectedStatus: 200
    expectedBody: Hello, World!
benchmark:
  warmupSeconds: 5
  durationSeconds: 30
  repetitions: 1
  connections:
    - 1
  streamsPerConnection:
    - 1
benchmarkCompat:
  compatibleLoadShapes:
    - fixed-path-request-response
  primaryMetrics:
    - requestsPerSecond
    - latencyP50
    - latencyP95
    - latencyP99
    - errorRate
artifacts:
  required:
    - validation.json
    - result.json
  optional:
    - qlog
    - counters
networkProfile: clean
requiredMetrics:
  - requestsPerSecond
  - latencyMeanMs
artifactRequirements:
  - load-tool.stdout.txt
  - load-tool.stderr.txt
tags:
  - phase1
  - http
  - plaintext
