id: quic-transport-v1-comparison
name: ProtocolLab stable raw QUIC transport comparison suite
description: Stable raw QUIC comparison coverage across handshake, throughput, multiplexing, connection churn, and duplex scenarios.
purpose: benchmark
resultKind: benchmark
loadProfileId: raw-quic-peer-confidence
scenarios:
  - quic.transport.latency.echo-1kb
  - quic.transport.stream-throughput.1mb
  - quic.transport.multiplex.100x64kb
  - quic.transport.stream-limits.100x64kb
  - quic.transport.connection-churn
  - quic.transport.duplex-streams
  - quic.transport.handshake-cold
protocol: quic
defaults:
  durationSeconds: 15
  warmupSeconds: 5
  repetitions: 5
counterCapture:
  enabledByDefault: false
  tool: dotnet-counters
notes: Stable raw QUIC comparison input. The raw-quic-peer-confidence profile supplies timing and repetition policy while each scenario retains its valid connection and stream matrix. Stream-limit pressure intentionally remains a one-connection semantic capacity check. Evidence remains local-lab only.
