# Load Profile Contract v1
schemaVersion: protocol-lab.load-profile.v1

id: quic-soak
title: QUIC Soak
status: experimental
purpose: soak

description: >
  Long-duration protocol-specific stability profile for participants that explicitly opt into soak evidence.

durationSeconds: 3600
warmupSeconds: 60
cooldownSeconds: 30
repetitions: 1

quic:
  connections: 8
  streamsPerConnection: 16
  streamBytes: 1024
  connectionTimeoutSeconds: 30
  idleTimeoutSeconds: 30

evidence:
  minimumTier: soak
  publishable: false

artifacts:
  required:
    - load.stdout.log
    - load.stderr.log
    - validation.json
    - result.json
  optional:
    - counters
    - telemetry-bundle.json
    - soak-health-summary.json
