schemaVersion: "1.0"
id: http2.streaming.response
title: HTTP/2 Streaming Response
name: HTTP/2 Streaming Response
family: http.application
description: Validate a deterministic streaming HTTP response over an HTTP/2 server endpoint.
status: stable
kind: workload
layer: application
protocol: h2
roles:
  - server
requires:
  capabilities:
    - http.server
    - httpStreaming
  protocols:
    - h2
  roles:
    - server
trafficShape: streaming-download
implementationRole: server
requiredCapabilities:
  - httpStreaming
endpoint:
  method: GET
  path: /stream/response
  query: {}
  requestHeaders: {}
  requestBodyGeneration: none
  expectedStatus: 200
  expectedHeaders:
    content-type: application/octet-stream
  expectedBodyRule: deterministicStream
  expectedBodySize: 65536
validation:
  required: true
  checks:
    - status
    - content-type
    - body-size
    - deterministic-stream
    - protocol:h2
  http:
    expectedStatus: 200
    expectedProtocol: h2
    expectedBody: <deterministicStream>
benchmarkCompat:
  compatibleLoadShapes:
    - streaming-download
    - smoke
  primaryMetrics:
    - requestsPerSecond
    - latencyP50
    - latencyP95
    - latencyP99
    - errorRate
    - bytesReceived
artifacts:
  required:
    - validation.json
    - result.json
    - load-generator.stdout.txt
    - load-generator.stderr.txt
  optional:
    - response-sample.bin
    - counters
networkProfile: clean
requiredMetrics:
  - requestsPerSecond
  - bytesReceived
artifactRequirements:
  - load-generator.stdout.txt
  - load-generator.stderr.txt
tags:
  - http
  - h2
  - streaming
