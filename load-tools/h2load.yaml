# Load Tool Contract v1
schemaVersion: protocol-lab.load-tool.v1

id: h2load
title: h2load HTTP/3
name: h2load
description: nghttp2 HTTP load generator with HTTP/1.1, HTTP/2, and HTTP/3 capable builds.
kind: process
category: external-reference

supports:
  protocols:
    - h1
    - h2
    - h3
  trafficShapes:
    - request-response
    - download
  roles:
    - client

metrics:
  primary:
    - requestsPerSecond
    - latencyP50
    - latencyP95
    - latencyP99
    - latencyMean
    - throughputBytesPerSecond
    - errorRate
  secondary:
    - bytesRead
    - bytesWritten
    - latencyP75
    - latencyP90
    - latencyMin
    - latencyMax
    - connectTimeMean
    - timeToFirstByteMean

execution:
  process:
    executable: h2load
    defaultArguments: []
    versionCommand:
      - --version
    availabilityCheck: path
  docker:
    image: incursa/protocol-lab-h2load-http3:local
    commandTemplate:
      - h2load
      - --h3
      - -n
      - "{totalRequests}"
      - -c
      - "{connections}"
      - -m
      - "{streamsPerConnection}"
      - "{url}"
    command: h2load
    arguments: []
    environment: {}
    autoPull: false
    hostRewrite: host.docker.internal
    sni: localhost

parser:
  type: h2load
  id: h2load
  preservesRawOutput: true

artifacts:
  required:
    - load.stdout.log
    - load.stderr.log
  optional:
    - load.metrics.json
    - load.raw.json

purposes:
  - validation
  - benchmark
  - profile

limitations:
  - HTTP/3 requires containerized h2load --help to advertise --h3
  - Does not validate HTTP/3 settings semantics
  - Metrics are tool-reported and should not be mixed with managed load metrics without warning
  - JSON output requires --output-file flag
  - qlog requires --qlog-file-base flag

# Legacy fields
supportedProtocols:
  - h1
  - h2
  - h3
supportedScenarioFamilies:
  - http.application
  - h3.protocol
executable: h2load
dockerImage: incursa/protocol-lab-h2load-http3:local
dockerCommand: h2load
dockerArguments: []
dockerEnvironment: {}
dockerAutoPull: false
dockerHostRewrite: host.docker.internal
sni: localhost
defaultArguments: []
versionCommand:
  - --version
availabilityCheck: path
outputParserId: h2load
notes: Process mode is supported when h2load is on PATH. Docker mode uses the repo-owned local image built by scripts/build/Build-H2LoadHttp3Image.ps1 and rewrites loopback targets to host.docker.internal for Windows Docker Desktop host access. HTTP/3 requires containerized h2load --help to advertise --h3. JSON output requires --output-file, qlog requires --qlog-file-base, and host-process Docker access may need --sni.
