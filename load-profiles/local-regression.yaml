# Load Profile Contract v1
schemaVersion: protocol-lab.load-profile.v1

id: local-regression
title: Local Regression
status: stable
purpose: regression

description: >
  Moderate-burden profile for local development regression runs.
  Longer than smoke, with more connections, suitable for catching
  performance regressions on shared-host hardware. Not publishable.

durationSeconds: 15
warmupSeconds: 5
repetitions: 2

http:
  connections: 16
  concurrency: 16

http2:
  connections: 16
  concurrency: 16
  streamsPerConnection: 10

http3:
  connections: 16
  concurrency: 16
  streamsPerConnection: 10

quic:
  connections: 8
  streamsPerConnection: 8

evidence:
  minimumTier: local-regression
  publishable: false

artifacts:
  required:
    - load.stdout.log
    - load.stderr.log
    - validation.json
    - result.json
  optional:
    - counters
