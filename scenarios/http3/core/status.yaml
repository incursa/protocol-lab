schemaVersion: "1.0"
id: http3.core.status
title: HTTP/3 Status
name: HTTP/3 Status
family: http.application
description: Validate and benchmark the status endpoint used to confirm target identity and protocol visibility.
status: stable
kind: workload
layer: application
protocol: h3
roles:
  - server
requires:
  capabilities:
    - http.server
  protocols:
    - h3
  roles:
    - server
trafficShape: request-response
implementationRole: server
requiredCapabilities:
  - httpStatus
endpoint:
  method: GET
  path: /status
  query: {}
  requestHeaders: {}
  expectedStatus: 200
  expectedHeaders:
    content-type: application/json
  expectedBodyRule: jsonProperties
  expectedJsonProperties:
    server: KestrelBenchServer
    implementation: kestrel-http3
  expectedJsonKeys:
    - protocol
    - utc
    - processId
validation:
  required: true
  checks:
    - status
    - json-properties
    - protocol:h3
  http:
    expectedStatus: 200
    expectedProtocol: h3
    expectedBody: <jsonProperties>
benchmark:
  warmupSeconds: 5
  durationSeconds: 30
  repetitions: 1
  connections:
    - 1
  streamsPerConnection:
    - 1
benchmarkCompat:
  compatibleLoadShapes:
    - fixed-path-request-response
  primaryMetrics:
    - requestsPerSecond
    - latencyP50
    - latencyP95
    - latencyP99
    - errorRate
artifacts:
  required:
    - validation.json
    - result.json
  optional:
    - protocol-diagnostic-artifact
    - counters
networkProfile: clean
requiredMetrics:
  - requestsPerSecond
artifactRequirements:
  - load-generator.stdout.txt
  - load-generator.stderr.txt
tags:
  - phase2
  - http
  - h3
  - http3
  - status
