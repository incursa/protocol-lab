id: kestrel-adapter-v1
name: Kestrel Adapter v1
description: Process-backed ProtocolLab Adapter Contract v1 control plane for the repository's Kestrel benchmark server.
image: ""
targetKind: process
targetContract: adapter-v1
executable: dotnet
project: src/Incursa.ProtocolLab.Adapters.Kestrel/Incursa.ProtocolLab.Adapters.Kestrel.csproj
workingDirectory: .
dockerfile: ""
buildContext: .
containerName: ""
dockerNetwork: ""
dockerNetworkMode: published-port
dockerBaseUrl: http://127.0.0.1:53171
baseUrl: http://127.0.0.1:53171
adapterControlPlaneBaseUrl: http://127.0.0.1:53171
certificateMode: none
roles:
  - server
supportedProtocols:
  - h1
  - h2
  - h3
supportedWorkloadFamilies:
  - fixture.kestrel
ports:
  - name: control-plane
    containerPort: 53171
    hostPort: 53171
    protocol: tcp
environment:
  ASPNETCORE_URLS: http://127.0.0.1:53171
dockerEnvironment: {}
commandArguments: []
readinessCheck:
  type: http
  url: /protocol-lab/adapter/v1/health
  timeoutSeconds: 10
shutdownBehavior: process-exit
capabilities:
  - httpPlaintext
  - httpJson
  - httpStatus
  - httpBytes
  - httpStreaming
  - httpUpload
  - httpHeaders
artifactExports:
  - server.stdout.txt
  - server.stderr.txt
qlogSupport: false
sslKeyLogSupport: false
notes: Process-backed adapter control plane for the Kestrel benchmark server. The control plane is HTTP/1.1 JSON and the returned protocol endpoint is separate from the control plane URL.
