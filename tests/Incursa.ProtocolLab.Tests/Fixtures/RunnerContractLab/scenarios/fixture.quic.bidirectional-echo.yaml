id: fixture.quic.bidirectional-echo
name: Fixture QUIC Bidirectional Echo
family: fixture.quic
version: 1.0
description: Fixture-only raw QUIC bidirectional stream echo through the adapter-backed runner flow.
protocol: quic
implementationRole: server
requiredCapabilities:
  - quicTransport
  - quicStreams
quicTransport:
  behavior: bidirectional-echo-fixture
  connectionCount: 1
  streamType: bidirectional
  streamCount: 1
  payloadSizeBytes: 1024
  payloadDirection: bidirectional
  openPattern: sequential
  expectedBytes: 2048
validation:
  required: true
  checks:
    - fixture
benchmark:
  warmupSeconds: 0
  durationSeconds: 1
  repetitions: 1
  connections:
    - 1
  streamsPerConnection:
    - 1
networkProfile: clean
requiredMetrics:
  - fixture.quic.streams
artifactRequirements:
  - result.json
  - validation.json
tags:
  - fixture
  - quic
  - foundation
