id: fixture.incursa-http3.json
name: Fixture Incursa HTTP/3 JSON
family: fixture.incursa-http3
version: 1.0
description: Validates the adapter-backed Incursa HTTP/3 JSON path.
protocol: h3
implementationRole: server
requiredCapabilities:
  - httpJson
endpoint:
  method: GET
  path: /json
  query: {}
  requestHeaders: {}
  expectedStatus: 200
  expectedBodyRule: exact
  expectedBody: '{"message":"Hello, World!"}'
validation:
  required: true
  checks:
    - status
    - body
benchmark:
  warmupSeconds: 0
  durationSeconds: 1
  repetitions: 1
  connections:
    - 1
  streamsPerConnection:
    - 1
networkProfile: clean
requiredMetrics:
  - requestsPerSecond
artifactRequirements:
  - result.json
  - validation.json
tags:
  - fixture
  - incursa-http3
  - adapter
