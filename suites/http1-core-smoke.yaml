id: http1-core-smoke
name: ProtocolLab HTTP/1 core smoke suite
description: Fast package-neutral HTTP/1 request/response validation for the core plaintext, JSON, and 1KB payload scenarios.
purpose: conformance
resultKind: conformance
loadProfileId: smoke
scenarios:
  - http.core.plaintext
  - http.core.json
  - http.payload.bytes.1kb
protocol: h1
defaults:
  durationSeconds: 5
  warmupSeconds: 1
  repetitions: 1
  connections: 1
  streamsPerConnection: 1
counterCapture:
  enabledByDefault: false
  tool: resource-summary
notes: Package-neutral suite selector for the HTTP/1 core lane. Implementations and test executors enter through run plans or package v2 inventory; this suite does not pin package references.
