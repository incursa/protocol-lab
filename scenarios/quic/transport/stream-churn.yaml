schemaVersion: "1.0"
id: quic.transport.connection-churn
title: QUIC Connection Churn
name: QUIC Connection Churn
family: quic.transport
description: Validate repeated QUIC connection and stream churn as a transport scenario independent of HTTP/3 application semantics.
status: stable
kind: protocolValidation
layer: transport
protocol: quic
roles:
  - server
requires:
  capabilities:
    - quic.server
  protocols:
    - quic
  roles:
    - server
trafficShape: connection-lifecycle
implementationRole: server
requiredCapabilities:
  - quicTransport
  - quicStreams
quicTransport:
  behavior: connection-churn
  connectionCount: 1
  streamType: bidirectional
  streamCount: 1000
  payloadSizeBytes: 128
  payloadDirection: bidirectional
  openPattern: churn
  expectedBytes: 128000
validation:
  required: true
  checks:
    - connection-and-stream-churn-completes
    - opened-and-closed-streams-match-expected
    - zero-timeouts-and-errors
    - protocol:quic
benchmark:
  warmupSeconds: 5
  durationSeconds: 30
  repetitions: 1
  connections:
    - 1
  streamsPerConnection:
    - 1000
benchmarkCompat:
  compatibleLoadShapes:
    - quic-connection-lifecycle
    - smoke
    - regression
    - comparison
  primaryMetrics:
    - connectionsPerSecond
    - streamsPerSecond
    - resetCount
    - errorRate
artifacts:
  required:
    - validation.json
    - result.json
  optional:
    - protocol-diagnostic-artifact
    - counters
networkProfile: clean
requiredMetrics:
  - quic.stream.openedStreams
  - quic.stream.closedStreams
  - quic.stream.resetCount
artifactRequirements:
  - load-generator.stdout.txt
  - load-generator.stderr.txt
  - protocol-diagnostic-artifact
tags:
  - phase6
  - quic
  - churn
