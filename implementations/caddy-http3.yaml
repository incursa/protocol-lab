id: caddy-http3
name: Caddy HTTP/3
description: Caddy HTTP/3 Docker benchmark target for ProtocolLab HTTP core validation.
image: incursa/protocol-lab-caddy-bench-server:local
targetKind: docker
dockerfile: servers/caddy/Dockerfile
buildContext: servers/caddy
dockerNetworkMode: published-port
dockerBaseUrl: https://localhost:5445
dockerProtocolBaseUrls:
  h3: https://localhost:5445
baseUrl: https://localhost:5445
protocolBaseUrls:
  h3: https://localhost:5445
certificateMode: caddy-internal-local-ca-loopback-certificate
roles:
  - server
supportedProtocols:
  - h3
supportedWorkloadFamilies:
  - http.application
ports:
  - name: https-h3
    containerPort: 8443
    hostPort: 5445
    protocol: tcp+udp
dockerEnvironment:
  PROTOCOL_LAB_IMPLEMENTATION: caddy-http3
targetDockerResourceLimits:
  notes: Optional CLI --target-* resource limits override or extend this manifest default.
commandArguments:
  - caddy
  - run
  - --config
  - /etc/caddy/Caddyfile
  - --adapter
  - caddyfile
dockerCommandArguments:
  - caddy
  - run
  - --config
  - /etc/caddy/Caddyfile
  - --adapter
  - caddyfile
readinessCheck:
  type: http
  url: /plaintext
  timeoutSeconds: 30
  startupDelayMilliseconds: 1000
shutdownBehavior: process-exit
capabilities:
  - httpPlaintext
  - httpJson
artifactExports:
  - server.stdout.txt
  - server.stderr.txt
qlogSupport: false
sslKeyLogSupport: false
notes: Docker-only Caddy HTTP/3 target. Build the local image with scripts/build/Build-CaddyBenchServerImage.ps1. Caddy serves /plaintext and /json from servers/caddy/Caddyfile, listens on 8443/tcp+udp in the container, and publishes host port 5445 for managed exact HTTP/3 validation. Shared-network Docker h2load keeps the logical URL and SNI as localhost and uses --connect-to toward the caddy-http3 network alias. The target uses Caddy tls internal local CA material generated inside the container; ProtocolLab records loopback certificate bypass in proof artifacts. Caddy results remain local Docker evidence and are not publishable benchmark data.
