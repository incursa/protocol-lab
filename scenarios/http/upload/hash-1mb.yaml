schemaVersion: "1.0"
title: HTTP Upload Hash 1MB
status: stable
kind: workload
layer: application
roles:
  - server
requires:
  capabilities:
    - http.server
  protocols:
    - h1
    - h2
    - h3
  roles:
    - server
trafficShape: upload
id: http.upload.hash.1mb
name: HTTP Upload Hash 1MB
family: http.application
description: Validate and benchmark reading and hashing a 1MB request body.
protocol: h3
implementationRole: server
requiredCapabilities:
  - httpUpload
endpoint:
  method: POST
  path: /hash
  query: {}
  requestHeaders: {}
  requestBodyGeneration: deterministic-bytes:1048576
  expectedStatus: 200
  expectedHeaders:
    content-type: application/json
  expectedBodyRule: jsonHashResult
validation:
  required: true
  checks: [status, bytes-read, sha256]
http:
  expectedStatus: 200
  expectedBody: <jsonHashResult>
benchmark:
  warmupSeconds: 5
  durationSeconds: 30
  repetitions: 1
  connections: [1]
  streamsPerConnection: [1]
benchmarkCompat:
  compatibleLoadShapes:
    - fixed-path-request-response
  primaryMetrics:
    - requestsPerSecond
    - latencyP50
    - latencyP95
    - latencyP99
    - errorRate
artifacts:
  required:
    - validation.json
    - result.json
  optional:
    - protocol-diagnostic-artifact
    - counters
networkProfile: clean
requiredMetrics: [requestsPerSecond, bytesSent]
artifactRequirements: [load-generator.stdout.txt, load-generator.stderr.txt]
tags: [phase2, http, upload]
