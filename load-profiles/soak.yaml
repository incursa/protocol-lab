# Load Profile Contract v1
schemaVersion: protocol-lab.load-profile.v1

id: soak
title: Soak
status: experimental
purpose: soak

description: >
  Long-duration stability profile for implementations that explicitly opt into
  soak evidence. The profile defines intent and minimum reporting shape, not a
  required load generator.

durationSeconds: 3600
warmupSeconds: 60
cooldownSeconds: 30
repetitions: 1

http1:
  connections: 16
  concurrency: 16
  requestTimeoutSeconds: 30

http2:
  connections: 16
  concurrency: 64
  streamsPerConnection: 16
  requestTimeoutSeconds: 30

http3:
  connections: 16
  concurrency: 64
  streamsPerConnection: 16
  requestTimeoutSeconds: 30

quic:
  connections: 8
  streamsPerConnection: 16
  streamBytes: 1024
  connectionTimeoutSeconds: 30
  idleTimeoutSeconds: 30

evidence:
  minimumTier: soak
  publishable: false

artifacts:
  required:
    - load.stdout.log
    - load.stderr.log
    - validation.json
    - result.json
  optional:
    - counters
    - telemetry-bundle.json
    - soak-health-summary.json
