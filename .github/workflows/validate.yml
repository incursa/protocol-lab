          ]
          for fixture_root, validator, label in invalid_fixture_validators:
              for path, data in json_docs.items():
                  if not path.is_relative_to(fixture_root):
                      continue
                  if validator.is_valid(data):
                      errors.append(f"{rel(path)}: invalid {label} unexpectedly passes schema validation")

          versioned_invalid_fixture_validators = [
              (root / "fixtures" / "public-contracts" / "scenarios" / "invalid", scenario_validators, "scenario fixture"),
              (root / "fixtures" / "public-contracts" / "load-profiles" / "invalid", load_profile_validators, "load-profile fixture"),
          ]
          for fixture_root, validators, label in versioned_invalid_fixture_validators:
              for path, data in json_docs.items():
                  if not path.is_relative_to(fixture_root):
                      continue
                  validator = validator_for(data, validators, path, label)
                  if validator and validator.is_valid(data):
                      errors.append(f"{rel(path)}: invalid {label} unexpectedly passes schema validation")

          root_suite_ids = {}
          for path, data in yaml_docs.items():
              if not isinstance(data, dict) or not path.is_relative_to(root / "suites"):
