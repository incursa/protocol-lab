schemaVersion: "1.0"
id: http3.protocol.multiplex-100-streams
title: HTTP/3 Multiplex 100 Streams
name: HTTP/3 Multiplex 100 Streams
family: http3.protocol
description: Validate HTTP/3 multiplexing across 100 concurrent request streams over one QUIC connection.
status: stable
kind: protocolValidation
layer: protocol
protocol: h3
roles:
  - server
requires:
  capabilities:
    - h3.server
    - quic.server
  protocols:
    - h3
  roles:
    - server
trafficShape: bidirectional-stream
implementationRole: server
requiredCapabilities:
  - h3Protocol
  - h3Multiplexing
h3Protocol:
  behavior: multiplex-request-streams
  requestPath: /bytes/1024
  concurrentRequestStreams: 100
  expectedFrameTypes:
    - headers
    - data
validation:
  required: true
  checks:
    - stream-concurrency-observable
    - completed-responses-match-expected
    - protocol:h3
benchmark:
  warmupSeconds: 5
  durationSeconds: 30
  repetitions: 1
  connections:
    - 1
  streamsPerConnection:
    - 100
benchmarkCompat:
  compatibleLoadShapes:
    - fixed-path-request-response
  primaryMetrics:
    - requestsPerSecond
    - latencyP50
    - latencyP95
    - latencyP99
    - errorRate
artifacts:
  required:
    - validation.json
    - result.json
  optional:
    - protocol-diagnostic-artifact
    - counters
networkProfile: clean
requiredMetrics:
  - h3.stream.concurrentRequests
  - h3.stream.completedRequests
  - h3.stream.maxActiveStreams
artifactRequirements:
  - load-generator.stdout.txt
  - load-generator.stderr.txt
  - protocol-diagnostic-artifact
tags:
  - phase5
  - http
  - h3
  - http3
  - protocol
  - multiplexing
