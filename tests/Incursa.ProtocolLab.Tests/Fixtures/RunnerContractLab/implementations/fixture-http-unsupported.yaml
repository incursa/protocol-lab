id: fixture-http-unsupported
name: Fixture HTTP Unsupported
description: Dummy target that intentionally does not support the requested protocol.
image: ""
targetKind: process
executable: powershell
project: ""
workingDirectory: .
dockerfile: ""
buildContext: .
containerName: ""
dockerNetwork: ""
dockerNetworkMode: published-port
dockerBaseUrl: http://127.0.0.1:51883
baseUrl: http://127.0.0.1:51883
certificateMode: none
roles:
  - server
supportedProtocols:
  - h2
supportedWorkloadFamilies:
  - fixture.http
ports:
  - name: http
    containerPort: 51883
    hostPort: 51883
    protocol: tcp
environment: {}
dockerEnvironment: {}
commandArguments:
  - -NoProfile
  - -ExecutionPolicy
  - Bypass
  - -File
  - scripts/fixture-http-server.ps1
  - -Port
  - "51883"
  - -Body
  - fixture-ok
readinessCheck:
  type: http
  url: /ok
  timeoutSeconds: 10
shutdownBehavior: process-exit
capabilities:
  - fixtureHttp
artifactExports:
  - server.stdout.txt
  - server.stderr.txt
qlogSupport: false
sslKeyLogSupport: false
notes: Fixture-only unsupported target.
