id: fixture.kestrel.json
name: Fixture Kestrel JSON
family: fixture.kestrel
version: 1.0
description: Validates the adapter-backed JSON endpoint.
protocol: h1
implementationRole: server
requiredCapabilities:
  - httpJson
endpoint:
  method: GET
  path: /json
  query: {}
  requestHeaders: {}
  expectedStatus: 200
  expectedHeaders:
    content-type: application/json
  expectedBodyRule: jsonEquivalent
  expectedBody: '{"message":"Hello, World!"}'
validation:
  required: true
  checks:
    - status
    - content-type
    - body
benchmark:
  warmupSeconds: 0
  durationSeconds: 1
  repetitions: 1
  connections:
    - 1
  streamsPerConnection:
    - 1
networkProfile: clean
requiredMetrics:
  - requestsPerSecond
artifactRequirements:
  - result.json
  - validation.json
tags:
  - fixture
  - kestrel
  - adapter
