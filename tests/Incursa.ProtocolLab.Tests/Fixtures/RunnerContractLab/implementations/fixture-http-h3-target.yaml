id: fixture-http-h3-target
name: Fixture HTTP H3 Contract Target
description: Dummy target used to prove validation unsupported for modeled H3 validation.
image: ""
targetKind: process
executable: powershell
project: ""
workingDirectory: .
dockerfile: ""
buildContext: .
containerName: ""
dockerNetwork: ""
dockerNetworkMode: published-port
dockerBaseUrl: http://127.0.0.1:51884
baseUrl: http://127.0.0.1:51884
certificateMode: none
roles:
  - server
supportedProtocols:
