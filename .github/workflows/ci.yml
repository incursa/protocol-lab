name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore solution
        run: dotnet restore Incursa.ProtocolLab.sln

      - name: Build solution
        run: dotnet build Incursa.ProtocolLab.sln --no-restore

      - name: Test solution
        run: dotnet test Incursa.ProtocolLab.sln --no-build

      - name: Run repository check
        run: dotnet run --project src\Incursa.ProtocolLab.Cli -- check

      - name: Validate markdown links
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $root = (Get-Location).Path
          function Test-IsExcludedPath {
            param([string] $Path)

            $parts = [System.IO.Path]::GetRelativePath($root, $Path) -split '[\\/]'
            return $parts -contains '.git' -or $parts -contains '.artifacts' -or $parts -contains 'bin' -or $parts -contains 'obj'
          }

          $markdownFiles = Get-ChildItem -Path . -Recurse -File -Filter *.md | Where-Object {
            -not (Test-IsExcludedPath -Path $_.FullName)
          }
          $brokenLinks = New-Object System.Collections.Generic.List[string]
          foreach ($file in $markdownFiles) {
            $content = Get-Content $file.FullName -Raw
            foreach ($match in [regex]::Matches($content, '\[[^\]]*\]\(([^)]+)\)')) {
              $target = $match.Groups[1].Value.Trim()
              if ($target -match '^(https?:|mailto:|#)') { continue }
              $target = $target.Split('#')[0]
              if ([string]::IsNullOrWhiteSpace($target)) { continue }
              $resolved = [System.IO.Path]::GetFullPath((Join-Path $file.DirectoryName $target))
              if (-not (Test-Path $resolved)) {
                $brokenLinks.Add("$($file.FullName): $target")
              }
            }
          }
          if ($brokenLinks.Count -gt 0) {
            $brokenLinks | ForEach-Object { Write-Error $_ }
            throw "Broken markdown links were found."
          }

      - name: Scan for private path leaks
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $root = (Get-Location).Path
          function Test-IsExcludedPath {
            param([string] $Path)

            $parts = [System.IO.Path]::GetRelativePath($root, $Path) -split '[\\/]'
            return $parts -contains '.git' -or $parts -contains '.artifacts' -or $parts -contains 'bin' -or $parts -contains 'obj'
          }

          $patterns = @(
            'C:\\shared\\src\\incursa\\',
            'C:\\Users\\Samuel\\',
            '(?i)\b(api[_-]?key|password|token|secret)\b\s*[:=]\s*["'']?[A-Za-z0-9/_+=.-]{8,}',
            ('BEGIN' + ' PRIVATE KEY')
          )
          $files = Get-ChildItem -Path . -Recurse -File -Include *.md,*.yml,*.yaml,*.ps1,*.cs,*.props,*.targets,*.csproj | Where-Object {
            -not (Test-IsExcludedPath -Path $_.FullName)
          }
          $hits = New-Object System.Collections.Generic.List[string]
          foreach ($pattern in $patterns) {
            $matches = Select-String -Path $files.FullName -Pattern $pattern -AllMatches
            foreach ($match in $matches) {
              $hits.Add("$($match.Path):$($match.LineNumber): $($match.Line.Trim())")
            }
          }
          if ($hits.Count -gt 0) {
            $hits | ForEach-Object { Write-Error $_ }
            throw "Potential private path or secret leaks were found."
          }
