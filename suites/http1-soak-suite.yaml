id: http1-soak-suite
name: ProtocolLab HTTP/1 soak suite
description: Profile-specific HTTP/1 application selector for the soak load profile.
purpose: soak
resultKind: soak
loadProfileId: http1-soak
scenarios:
  - http1.core.plaintext
  - http1.core.json
  - http1.payload.bytes.1kb
protocol: h1
defaults:
  durationSeconds: 3600
  warmupSeconds: 60
  repetitions: 1
  connections: 16
  streamsPerConnection: 16
counterCapture:
  enabledByDefault: false
  tool: ""
notes: This suite selects existing public HTTP/1 scenarios with the protocol-specific http1-soak load profile; it does not imply a required runner or load generator.
tags:
  - http1
  - soak
