name: Repository Health

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repository-health:
    name: Public Contract Repository Health
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install validation dependencies
        shell: bash
        run: |
          python3 -m pip install --disable-pip-version-check --no-cache-dir "PyYAML>=6,<7" "jsonschema>=4,<5"

      - name: Validate public repository health
        shell: bash
        run: |
          python3 - <<'PY'
          import base64
          import hashlib
          import json
          import pathlib
          import re
          import sys
          import yaml
          from jsonschema import Draft202012Validator

          root = pathlib.Path(".").resolve()
          errors = []

          def rel(path: pathlib.Path) -> str:
              return path.relative_to(root).as_posix()

          def exists_repo_path(value: str) -> bool:
              path = root / value.rstrip("/")
              return path.exists()

          def load_json(path: pathlib.Path):
              return json.loads(path.read_text(encoding="utf-8"))

          json_docs = {}
          for path in sorted(root.rglob("*.json")):
              if ".git" in path.parts:
                  continue
              try:
                  json_docs[path] = json.loads(path.read_text(encoding="utf-8"))
              except Exception as exc:
                  errors.append(f"{rel(path)}: invalid JSON: {exc}")

          yaml_docs = {}
          for path in sorted(list(root.rglob("*.yaml")) + list(root.rglob("*.yml"))):
              if ".git" in path.parts:
                  continue
              try:
                  yaml_docs[path] = yaml.safe_load(path.read_text(encoding="utf-8"))
              except Exception as exc:
                  errors.append(f"{rel(path)}: invalid YAML: {exc}")

          scenario_schema = load_json(root / "schemas" / "scenario.schema.json")
          suite_schema = load_json(root / "schemas" / "suite" / "v1" / "suite.schema.json")
          load_profile_schema = load_json(root / "schemas" / "load-profile" / "load-profile.schema.json")
          package_schema = load_json(root / "schemas" / "package" / "v2" / "package.schema.json")
          run_plan_schema = load_json(root / "schemas" / "run-plan" / "v1" / "run-plan.schema.json")
          validation_check_outcomes_schema = load_json(root / "schemas" / "validation" / "v1" / "check-outcomes.schema.json")
          evidence_report_schema = load_json(root / "schemas" / "public-report" / "v1" / "evidence-report-v1.schema.json")
          tls_certificate_profile_schema = load_json(root / "schemas" / "tls" / "v1" / "certificate-profile.schema.json")
          scenario_validator = Draft202012Validator(scenario_schema)
          suite_validator = Draft202012Validator(suite_schema)
          load_profile_validator = Draft202012Validator(load_profile_schema)
          package_validator = Draft202012Validator(package_schema)
          run_plan_validator = Draft202012Validator(run_plan_schema)
          validation_check_outcomes_validator = Draft202012Validator(validation_check_outcomes_schema)
          evidence_report_validator = Draft202012Validator(evidence_report_schema)
          tls_certificate_profile_validator = Draft202012Validator(tls_certificate_profile_schema)

          specification_schema_root = root / "schemas" / "specification" / "v1"
          specification_schema_files = {
              "protocol-lab.specification-document.v1": "document.schema.json",
              "protocol-lab.specification-requirement.v1": "requirement.schema.json",
              "protocol-lab.specification-catalog.v1": "catalog.schema.json",
              "protocol-lab.scenario-requirement-mapping.v1": "scenario-mapping.schema.json",
              "protocol-lab.specification-coverage-profile.v1": "coverage-profile.schema.json",
              "protocol-lab.specification-coverage-evidence.v1": "coverage-evidence.schema.json",
              "protocol-lab.specification-coverage-index.v1": "coverage-index.schema.json",
          }
          specification_validators = {
              version: Draft202012Validator(load_json(specification_schema_root / filename))
              for version, filename in specification_schema_files.items()
          }

          specification_records = {}
          specification_root = root / "specifications"
          for path, data in json_docs.items():
              if not path.is_relative_to(specification_root):
                  continue
              version = data.get("schemaVersion") if isinstance(data, dict) else None
              validator = specification_validators.get(version)
              if not validator:
                  errors.append(f"{rel(path)}: unknown specification schemaVersion {version}")
                  continue
              for error in validator.iter_errors(data):
                  errors.append(f"{rel(path)}: specification schema: {error.message}")
              specification_records[path] = data

          valid_specification_fixtures = root / "fixtures" / "public-contracts" / "specification" / "valid"
          for path, data in json_docs.items():
              if not path.is_relative_to(valid_specification_fixtures):
                  continue
              version = data.get("schemaVersion") if isinstance(data, dict) else None
              validator = specification_validators.get(version)
              if not validator:
                  errors.append(f"{rel(path)}: unknown specification fixture schemaVersion {version}")
                  continue
              for error in validator.iter_errors(data):
                  errors.append(f"{rel(path)}: specification fixture schema: {error.message}")

          invalid_specification_fixtures = root / "fixtures" / "public-contracts" / "specification" / "invalid"
          for path, data in json_docs.items():
              if not path.is_relative_to(invalid_specification_fixtures):
                  continue
              version = data.get("schemaVersion") if isinstance(data, dict) else None
              validator = specification_validators.get(version)
              if not validator:
                  errors.append(f"{rel(path)}: unknown invalid specification fixture schemaVersion {version}")
                  continue
              if validator.is_valid(data):
                  errors.append(f"{rel(path)}: invalid specification fixture unexpectedly passes schema validation")

          valid_validation_fixtures = root / "fixtures" / "public-contracts" / "validation" / "valid"
          for path, data in json_docs.items():
              if not path.is_relative_to(valid_validation_fixtures):
                  continue
              for error in validation_check_outcomes_validator.iter_errors(data):
                  errors.append(f"{rel(path)}: validation check outcomes schema: {error.message}")

          invalid_validation_fixtures = root / "fixtures" / "public-contracts" / "validation" / "invalid"
          for path, data in json_docs.items():
              if not path.is_relative_to(invalid_validation_fixtures):
                  continue
              if validation_check_outcomes_validator.is_valid(data):
                  errors.append(f"{rel(path)}: invalid validation check outcomes fixture unexpectedly passes schema validation")

          scenario_ids = {}
          for path, data in yaml_docs.items():
              if not isinstance(data, dict):
                  continue
              if not path.is_relative_to(root / "scenarios"):
                  continue
              if "network" in path.parts and "profiles" in path.parts:
                  continue
              if data.get("schemaVersion"):
                  for error in scenario_validator.iter_errors(data):
                      errors.append(f"{rel(path)}: scenario schema: {error.message}")
                  scenario_id = data.get("id")
                  if scenario_id in scenario_ids:
                      errors.append(f"{rel(path)}: duplicate scenario id {scenario_id} also in {rel(scenario_ids[scenario_id])}")
                  scenario_ids[scenario_id] = path
                  protocol = data.get("protocol")
                  required_protocols = data.get("requires", {}).get("protocols") or []
                  if protocol and protocol not in required_protocols:
                      errors.append(f"{rel(path)}: protocol {protocol} is not in requires.protocols {required_protocols}")
                  if isinstance(scenario_id, str) and scenario_id.startswith("http."):
                      errors.append(f"{rel(path)}: stale generic http.* scenario id {scenario_id}")

          specification_documents = {
              data.get("documentId"): (path, data)
              for path, data in specification_records.items()
              if data.get("schemaVersion") == "protocol-lab.specification-document.v1"
          }
          specification_requirements = {
              data.get("requirementId"): (path, data)
              for path, data in specification_records.items()
              if data.get("schemaVersion") == "protocol-lab.specification-requirement.v1"
          }
          specification_catalogs = {
              (data.get("catalogId"), data.get("catalogVersion")): (path, data)
              for path, data in specification_records.items()
              if data.get("schemaVersion") == "protocol-lab.specification-catalog.v1"
          }
          specification_mappings = {
              (data.get("mappingId"), data.get("mappingVersion")): (path, data)
              for path, data in specification_records.items()
              if data.get("schemaVersion") == "protocol-lab.scenario-requirement-mapping.v1"
          }

          for label, index in [
              ("document", specification_documents),
              ("requirement", specification_requirements),
              ("catalog", specification_catalogs),
              ("mapping", specification_mappings),
          ]:
              expected_count = sum(
                  1 for data in specification_records.values()
                  if data.get("schemaVersion") == {
                      "document": "protocol-lab.specification-document.v1",
                      "requirement": "protocol-lab.specification-requirement.v1",
                      "catalog": "protocol-lab.specification-catalog.v1",
                      "mapping": "protocol-lab.scenario-requirement-mapping.v1",
                  }[label]
              )
              if len(index) != expected_count:
                  errors.append(f"specifications: duplicate {label} identity detected")

          for requirement_id, (path, data) in specification_requirements.items():
              if data.get("documentId") not in specification_documents:
                  errors.append(f"{rel(path)}: requirement documentId {data.get('documentId')} does not resolve")

          for catalog_key, (path, data) in specification_catalogs.items():
              if len(data.get("documentIds", [])) != len(data.get("documentPaths", [])):
                  errors.append(f"{rel(path)}: catalog document IDs and paths must have equal length")
              if len(data.get("requirementIds", [])) != len(data.get("requirementPaths", [])):
                  errors.append(f"{rel(path)}: catalog requirement IDs and paths must have equal length")
              for document_id, document_path in zip(data.get("documentIds", []), data.get("documentPaths", [])):
                  resolved = root / document_path
                  if not resolved.exists():
                      errors.append(f"{rel(path)}: catalog document path {document_path} does not exist")
                  elif json_docs.get(resolved, {}).get("documentId") != document_id:
                      errors.append(f"{rel(path)}: catalog document path {document_path} does not contain {document_id}")
              for requirement_id, requirement_path in zip(data.get("requirementIds", []), data.get("requirementPaths", [])):
                  resolved = root / requirement_path
                  if not resolved.exists():
                      errors.append(f"{rel(path)}: catalog requirement path {requirement_path} does not exist")
                  elif json_docs.get(resolved, {}).get("requirementId") != requirement_id:
                      errors.append(f"{rel(path)}: catalog requirement path {requirement_path} does not contain {requirement_id}")

          for mapping_key, (path, data) in specification_mappings.items():
              catalog_key = (data.get("catalogId"), data.get("catalogVersion"))
              if catalog_key not in specification_catalogs:
                  errors.append(f"{rel(path)}: mapping catalog {catalog_key} does not resolve")
              scenario_id = data.get("scenarioId")
              scenario_path = scenario_ids.get(scenario_id)
              if not scenario_path:
                  errors.append(f"{rel(path)}: mapping scenarioId {scenario_id} does not resolve")
                  continue
              scenario = yaml_docs[scenario_path]
              if data.get("protocol") != scenario.get("protocol"):
                  errors.append(f"{rel(path)}: mapping protocol does not match scenario {scenario_id}")
              available_checks = set(scenario.get("validation", {}).get("checks") or [])
              for relationship in data.get("relationships", []):
                  requirement_id = relationship.get("requirementId")
                  if requirement_id not in specification_requirements:
                      errors.append(f"{rel(path)}: mapping requirement {requirement_id} does not resolve")
                  for check_id in relationship.get("checkIds", []):
                      if check_id not in available_checks:
                          errors.append(f"{rel(path)}: mapping check {check_id} does not resolve in scenario {scenario_id}")

          for path, data in specification_records.items():
              version = data.get("schemaVersion")
              if version == "protocol-lab.specification-coverage-profile.v1":
                  catalog_key = (data.get("catalogId"), data.get("catalogVersion"))
                  if catalog_key not in specification_catalogs:
                      errors.append(f"{rel(path)}: coverage profile catalog {catalog_key} does not resolve")
                  for requirement_id in data.get("requirementIds", []):
                      if requirement_id not in specification_requirements:
                          errors.append(f"{rel(path)}: coverage profile requirement {requirement_id} does not resolve")
                  for scenario_id in data.get("scenarioIds", []):
                      if scenario_id not in scenario_ids:
                          errors.append(f"{rel(path)}: coverage profile scenario {scenario_id} does not resolve")

          load_profile_ids = {}
          for path, data in yaml_docs.items():
              if not isinstance(data, dict) or not path.is_relative_to(root / "load-profiles"):
                  continue
              for error in load_profile_validator.iter_errors(data):
                  errors.append(f"{rel(path)}: load-profile schema: {error.message}")
              load_profile_id = data.get("id")
              if load_profile_id in load_profile_ids:
                  errors.append(f"{rel(path)}: duplicate load profile id {load_profile_id} also in {rel(load_profile_ids[load_profile_id])}")
              load_profile_ids[load_profile_id] = path

          valid_fixture_validators = [
              (root / "fixtures" / "public-contracts" / "scenarios" / "valid", scenario_validator, "scenario fixture"),
              (root / "fixtures" / "public-contracts" / "suites" / "valid", suite_validator, "suite fixture"),
              (root / "fixtures" / "public-contracts" / "load-profiles" / "valid", load_profile_validator, "load-profile fixture"),
          ]
          for fixture_root, validator, label in valid_fixture_validators:
              for path, data in json_docs.items():
                  if not path.is_relative_to(fixture_root):
                      continue
                  for error in validator.iter_errors(data):
                      errors.append(f"{rel(path)}: {label} schema: {error.message}")

          root_suite_ids = {}
          for path, data in yaml_docs.items():
              if not isinstance(data, dict) or not path.is_relative_to(root / "suites"):
                  continue
              for error in suite_validator.iter_errors(data):
                  errors.append(f"{rel(path)}: suite schema: {error.message}")
              suite_id = data.get("id")
              root_suite_ids[suite_id] = path
              if data.get("loadProfileId") not in load_profile_ids:
                  errors.append(f"{rel(path)}: suite loadProfileId {data.get('loadProfileId')} does not resolve")
              for scenario_id in data.get("scenarios") or []:
                  scenario_path = scenario_ids.get(scenario_id)
                  if not scenario_path:
                      errors.append(f"{rel(path)}: suite scenario {scenario_id} does not resolve in root scenarios")
                      continue
                  scenario_protocol = yaml_docs[scenario_path].get("protocol")
                  if data.get("protocol") != scenario_protocol:
                      errors.append(f"{rel(path)}: suite protocol {data.get('protocol')} mismatches {scenario_id} protocol {scenario_protocol}")

          for suite_path, data in yaml_docs.items():
              if not isinstance(data, dict):
                  continue
              if not suite_path.is_relative_to(root / "fixtures" / "public-contracts" / "packages"):
                  continue
              if "suites" not in suite_path.parts:
                  continue
              for error in suite_validator.iter_errors(data):
                  errors.append(f"{rel(suite_path)}: package suite schema: {error.message}")
              if data.get("loadProfileId") and data.get("loadProfileId") not in load_profile_ids:
                  errors.append(f"{rel(suite_path)}: package suite loadProfileId {data.get('loadProfileId')} does not resolve")
              package_name = suite_path.relative_to(root / "fixtures" / "public-contracts" / "packages").parts[0]
              package_root = root / "fixtures" / "public-contracts" / "packages" / package_name
              local_scenarios = {}
              for scenario_path in sorted((package_root / "scenarios").rglob("*.yaml")):
                  scenario_data = yaml_docs.get(scenario_path)
                  if isinstance(scenario_data, dict) and scenario_data.get("id"):
                      local_scenarios[scenario_data["id"]] = scenario_path
                      for error in scenario_validator.iter_errors(scenario_data):
                          errors.append(f"{rel(scenario_path)}: package scenario schema: {error.message}")
                      if isinstance(scenario_data.get("id"), str) and scenario_data["id"].startswith("http."):
                          errors.append(f"{rel(scenario_path)}: stale generic http.* package scenario id {scenario_data['id']}")
              for scenario_id in data.get("scenarios") or []:
                  scenario_path = local_scenarios.get(scenario_id)
                  if not scenario_path:
                      errors.append(f"{rel(suite_path)}: package suite scenario {scenario_id} does not resolve in package-local scenarios")
                      continue
                  scenario_protocol = yaml_docs[scenario_path].get("protocol")
                  if data.get("protocol") != scenario_protocol:
                      errors.append(f"{rel(suite_path)}: package suite protocol {data.get('protocol')} mismatches {scenario_id} protocol {scenario_protocol}")

          package_index = {}
          package_fixture_root = root / "fixtures" / "public-contracts" / "packages"
          for manifest_path in sorted(package_fixture_root.rglob("protocol-lab-package.json")):
              manifest = json_docs.get(manifest_path) or load_json(manifest_path)
              package_key = (manifest.get("packageId"), manifest.get("packageVersion"))
              package_index[package_key] = manifest_path
              for entry in manifest.get("entryManifests", []):
                  if not (manifest_path.parent / entry).exists():
                      errors.append(f"{rel(manifest_path)}: missing entryManifests path {entry}")

              if manifest_path.is_relative_to(package_fixture_root / "invalid"):
                  continue

              for error in package_validator.iter_errors(manifest):
                  errors.append(f"{rel(manifest_path)}: package schema: {error.message}")

              package_root = manifest_path.parent
              local_scenarios = {}
              for scenario_path in sorted((package_root / "scenarios").rglob("*.yaml")):
                  scenario_data = yaml_docs.get(scenario_path)
                  if isinstance(scenario_data, dict) and scenario_data.get("id"):
                      local_scenarios[scenario_data["id"]] = scenario_path

              local_suites = {}
              for suite_path in sorted((package_root / "suites").rglob("*.yaml")):
                  suite_data = yaml_docs.get(suite_path)
                  if isinstance(suite_data, dict) and suite_data.get("id"):
                      local_suites[suite_data["id"]] = suite_path

              package_specification_records = {}
              for specification_path in sorted((package_root / "specifications").rglob("*.json")):
                  specification_data = json_docs.get(specification_path) or load_json(specification_path)
                  version = specification_data.get("schemaVersion") if isinstance(specification_data, dict) else None
                  validator = specification_validators.get(version)
                  if not validator:
                      errors.append(f"{rel(specification_path)}: unknown package specification schemaVersion {version}")
                      continue
                  for error in validator.iter_errors(specification_data):
                      errors.append(f"{rel(specification_path)}: package specification schema: {error.message}")
                  package_specification_records[specification_path] = specification_data

              for coverage in manifest.get("providedSpecificationCoverage", []):
                  catalog_path = package_root / coverage.get("catalogPath", "")
                  catalog = package_specification_records.get(catalog_path)
                  if not catalog:
                      errors.append(f"{rel(manifest_path)}: specification catalog path {coverage.get('catalogPath')} does not resolve")
                      continue
                  if (catalog.get("catalogId"), catalog.get("catalogVersion")) != (coverage.get("catalogId"), coverage.get("catalogVersion")):
                      errors.append(f"{rel(manifest_path)}: provided specification catalog identity does not match {coverage.get('catalogPath')}")
                  if len(catalog.get("documentIds", [])) != len(catalog.get("documentPaths", [])):
                      errors.append(f"{rel(catalog_path)}: package catalog document IDs and paths must have equal length")
                  if len(catalog.get("requirementIds", [])) != len(catalog.get("requirementPaths", [])):
                      errors.append(f"{rel(catalog_path)}: package catalog requirement IDs and paths must have equal length")
                  for document_id, document_relative_path in zip(catalog.get("documentIds", []), catalog.get("documentPaths", [])):
                      document = package_specification_records.get(package_root / document_relative_path)
                      if not document or document.get("documentId") != document_id:
                          errors.append(f"{rel(catalog_path)}: package document {document_id} does not resolve through {document_relative_path}")
                  for requirement_id, requirement_relative_path in zip(catalog.get("requirementIds", []), catalog.get("requirementPaths", [])):
                      requirement = package_specification_records.get(package_root / requirement_relative_path)
                      if not requirement or requirement.get("requirementId") != requirement_id:
                          errors.append(f"{rel(catalog_path)}: package requirement {requirement_id} does not resolve through {requirement_relative_path}")
                  for mapping_relative_path in coverage.get("mappingPaths", []):
                      mapping_path = package_root / mapping_relative_path
                      mapping = package_specification_records.get(mapping_path)
                      if not mapping:
                          errors.append(f"{rel(manifest_path)}: specification mapping path {mapping_relative_path} does not resolve")
                          continue
                      if (mapping.get("catalogId"), mapping.get("catalogVersion")) != (coverage.get("catalogId"), coverage.get("catalogVersion")):
                          errors.append(f"{rel(mapping_path)}: mapping catalog identity does not match package declaration")
                      scenario_id = mapping.get("scenarioId")
                      scenario_path = local_scenarios.get(scenario_id)
                      if not scenario_path:
                          errors.append(f"{rel(mapping_path)}: mapping scenario {scenario_id} is not package-local")
                          continue
                      available_checks = set(yaml_docs[scenario_path].get("validation", {}).get("checks") or [])
                      for relationship in mapping.get("relationships", []):
                          for check_id in relationship.get("checkIds", []):
                              if check_id not in available_checks:
                                  errors.append(f"{rel(mapping_path)}: mapping check {check_id} does not resolve in package scenario {scenario_id}")
                  for profile_relative_path in coverage.get("profilePaths", []):
                      profile_path = package_root / profile_relative_path
                      profile = package_specification_records.get(profile_path)
                      if not profile:
                          errors.append(f"{rel(manifest_path)}: specification profile path {profile_relative_path} does not resolve")
                          continue
                      if (profile.get("catalogId"), profile.get("catalogVersion")) != (coverage.get("catalogId"), coverage.get("catalogVersion")):
                          errors.append(f"{rel(profile_path)}: profile catalog identity does not match package declaration")
                      for scenario_id in profile.get("scenarioIds", []):
                          if scenario_id not in local_scenarios:
                              errors.append(f"{rel(profile_path)}: profile scenario {scenario_id} is not package-local")

              provided_scenario_ids = {entry.get("scenarioId") for entry in manifest.get("providedScenarios", [])}
              if provided_scenario_ids and provided_scenario_ids != set(local_scenarios):
                  errors.append(f"{rel(manifest_path)}: providedScenarios do not match package-local scenario manifests")
              for entry in manifest.get("providedScenarios", []):
                  scenario_id = entry.get("scenarioId")
                  scenario_path = local_scenarios.get(scenario_id)
                  if not scenario_path:
                      errors.append(f"{rel(manifest_path)}: provided scenario {scenario_id} has no package-local scenario manifest")
                      continue
                  scenario_protocol = yaml_docs[scenario_path].get("protocol")
                  if scenario_protocol not in (entry.get("protocols") or []):
                      errors.append(f"{rel(manifest_path)}: provided scenario {scenario_id} protocols do not include {scenario_protocol}")

              provided_suite_ids = {entry.get("suiteId") for entry in manifest.get("providedSuites", [])}
              if provided_suite_ids and provided_suite_ids != set(local_suites):
                  errors.append(f"{rel(manifest_path)}: providedSuites do not match package-local suite manifests")
              for entry in manifest.get("providedSuites", []):
                  suite_id = entry.get("suiteId")
                  suite_path = local_suites.get(suite_id)
                  if not suite_path:
                      errors.append(f"{rel(manifest_path)}: provided suite {suite_id} has no package-local suite manifest")
                      continue
                  suite_protocol = yaml_docs[suite_path].get("protocol")
                  if suite_protocol not in (entry.get("protocols") or []):
                      errors.append(f"{rel(manifest_path)}: provided suite {suite_id} protocols do not include {suite_protocol}")

          invalid_run_plan_root = root / "fixtures" / "public-contracts" / "run-plans" / "invalid"
          for run_plan_path, run_plan in json_docs.items():
              if not run_plan_path.is_relative_to(invalid_run_plan_root):
                  continue
              if not list(run_plan_validator.iter_errors(run_plan)):
                  errors.append(f"{rel(run_plan_path)}: invalid run-plan fixture unexpectedly passes schema validation")

          for run_plan_path, run_plan in json_docs.items():
              if not run_plan_path.is_relative_to(root / "fixtures" / "public-contracts" / "run-plans" / "valid"):
                  continue
              for error in run_plan_validator.iter_errors(run_plan):
                  errors.append(f"{rel(run_plan_path)}: run-plan schema: {error.message}")
              if run_plan.get("loadProfileId") not in load_profile_ids:
                  errors.append(f"{rel(run_plan_path)}: run-plan loadProfileId {run_plan.get('loadProfileId')} does not resolve")

              provided_scenarios = set()
              provided_suites = set()
              provided_implementations = set()
              provided_test_executors = set()
              for package_ref in run_plan.get("packages", []):
                  package_key = (package_ref.get("packageId"), package_ref.get("packageVersion"))
                  manifest_path = package_index.get(package_key)
                  if not manifest_path or manifest_path.is_relative_to(package_fixture_root / "invalid"):
                      errors.append(f"{rel(run_plan_path)}: package reference {package_key[0]} {package_key[1]} does not resolve to a valid package fixture")
                      continue
                  manifest = json_docs.get(manifest_path) or load_json(manifest_path)
                  provided_scenarios.update(entry.get("scenarioId") for entry in manifest.get("providedScenarios", []))
                  provided_suites.update(entry.get("suiteId") for entry in manifest.get("providedSuites", []))
                  provided_implementations.update(entry.get("implementationId") for entry in manifest.get("providedImplementations", []))
                  provided_test_executors.update(entry.get("testExecutorId") for entry in manifest.get("providedTestExecutors", []))

              for scenario_id in run_plan.get("scenarioIds", []):
                  if scenario_id not in provided_scenarios:
                      errors.append(f"{rel(run_plan_path)}: scenario {scenario_id} is not provided by the pinned package fixtures")
              for suite_id in run_plan.get("suiteIds", []):
                  if suite_id not in provided_suites:
                      errors.append(f"{rel(run_plan_path)}: suite {suite_id} is not provided by the pinned package fixtures")
              for implementation_id in run_plan.get("implementationIds", []):
                  if implementation_id not in provided_implementations:
                      errors.append(f"{rel(run_plan_path)}: implementation {implementation_id} is not provided by the pinned package fixtures")
              for test_executor_id in run_plan.get("testExecutorIds", []):
                  if test_executor_id not in provided_test_executors:
                      errors.append(f"{rel(run_plan_path)}: test executor {test_executor_id} is not provided by the pinned package fixtures")

          valid_report_root = root / "fixtures" / "public-contracts" / "public-reports" / "valid"
          for report_path, report in json_docs.items():
              if not report_path.is_relative_to(valid_report_root):
                  continue
              for error in evidence_report_validator.iter_errors(report):
                  errors.append(f"{rel(report_path)}: evidence-report schema: {error.message}")

          invalid_report_root = root / "fixtures" / "public-contracts" / "public-reports" / "invalid"
          for report_path, report in json_docs.items():
              if not report_path.is_relative_to(invalid_report_root):
                  continue
              if evidence_report_validator.is_valid(report):
                  errors.append(f"{rel(report_path)}: invalid evidence-report fixture unexpectedly passes schema validation")

          tls_fixture_root = root / "fixtures" / "public-contracts" / "tls"
          for descriptor_path in sorted(tls_fixture_root.rglob("certificate-profile.json")):
              descriptor = json_docs.get(descriptor_path) or load_json(descriptor_path)
              for error in tls_certificate_profile_validator.iter_errors(descriptor):
                  errors.append(f"{rel(descriptor_path)}: TLS certificate-profile schema: {error.message}")

              total_der_bytes = 0
              for descriptor_key in ("leaf", "trustAnchor"):
                  certificate = descriptor.get(descriptor_key, {})
                  pem_path = descriptor_path.parent / certificate.get("publicCertificatePath", "")
                  if not pem_path.is_file():
                      errors.append(f"{rel(descriptor_path)}: missing public certificate {certificate.get('publicCertificatePath')}")
                      continue
                  pem_text = pem_path.read_text(encoding="ascii")
                  match = re.fullmatch(r"-----BEGIN CERTIFICATE-----\s+([A-Za-z0-9+/=\s]+)-----END CERTIFICATE-----\s*", pem_text)
                  if not match:
                      errors.append(f"{rel(pem_path)}: invalid certificate PEM encoding")
                      continue
                  der = base64.b64decode(re.sub(r"\s+", "", match.group(1)), validate=True)
                  total_der_bytes += len(der)
                  if len(der) != certificate.get("derBytes"):
                      errors.append(f"{rel(pem_path)}: DER byte count does not match certificate profile")
                  if hashlib.sha256(der).hexdigest() != certificate.get("derSha256"):
                      errors.append(f"{rel(pem_path)}: DER SHA-256 does not match certificate profile")
              if total_der_bytes != descriptor.get("chain", {}).get("totalDerBytes"):
                  errors.append(f"{rel(descriptor_path)}: chain totalDerBytes does not match public certificates")

          for path in sorted(tls_fixture_root.rglob("*")):
              if path.is_file() and b"PRIVATE KEY" in path.read_bytes():
                  errors.append(f"{rel(path)}: private key material is forbidden in public TLS fixtures")

          forbidden_dirs = {
              "src", "tests", "scripts", "servers", "tools",
              "implementations", "load-tools"
          }
          forbidden_exts = {
              ".cs", ".csproj", ".fs", ".fsproj", ".vb", ".vbproj",
              ".sln", ".slnx", ".props", ".targets", ".go", ".py", ".ps1",
              ".sh", ".cmd", ".bat", ".js", ".jsx", ".ts", ".tsx", ".mjs",
              ".cjs", ".java", ".kt", ".rs", ".rb", ".php"
          }
          forbidden_names = {"Dockerfile", "docker-compose.yml", "package.json"}

          for name in sorted(forbidden_dirs):
              if (root / name).exists():
                  errors.append(f"{name}: forbidden implementation folder exists")

          for path in sorted(root.rglob("*")):
              if not path.is_file() or ".git" in path.parts:
                  continue
              rp = rel(path)
              if path.name in forbidden_names:
                  errors.append(f"{rp}: forbidden implementation/build file")
              if path.suffix.lower() in forbidden_exts:
                  errors.append(f"{rp}: forbidden implementation/source extension")

          schema_base = "https://schemas.incursa.com/protocol-lab/"
          for path in sorted((root / "schemas").rglob("*.schema.json")):
              data = json.loads(path.read_text(encoding="utf-8"))
              schema_id = data.get("$id")
              if schema_id and not schema_id.startswith(schema_base):
                  errors.append(f"{rel(path)}: $id must start with {schema_base}")

          md_link = re.compile(r"\[[^\]]+\]\(([^)]+)\)")
          for path in sorted(root.rglob("*.md")):
              if ".git" in path.parts:
                  continue
              text = path.read_text(encoding="utf-8")
              for line_no, line in enumerate(text.splitlines(), start=1):
                  for match in md_link.finditer(line):
                      target = match.group(1).strip()
                      if target.startswith("<") and target.endswith(">"):
                          target = target[1:-1]
                      if not target or target.startswith("#"):
                          continue
                      if re.match(r"^[a-zA-Z][a-zA-Z0-9+.-]*:", target):
                          continue
                      target_path = target.split("#", 1)[0]
                      if not target_path:
                          continue
                      if not (path.parent / target_path).exists():
                          errors.append(f"{rel(path)}:{line_no}: broken relative link {target}")

          trace_path = root / "specs" / "traceability" / "trace-links.json"
          if trace_path.exists():
              trace = json.loads(trace_path.read_text(encoding="utf-8"))
              path_keys = {"schemas", "fixtures", "architecture", "verification"}
              for artifact in trace.get("canonicalArtifacts", []):
                  if not exists_repo_path(artifact):
                      errors.append(f"specs/traceability/trace-links.json: missing canonical artifact {artifact}")
              for item in trace.get("requirements", []):
                  item_id = item.get("id", "<missing-id>")
                  for key in path_keys:
                      for value in item.get(key, []):
                          if not exists_repo_path(value):
                              errors.append(f"specs/traceability/trace-links.json: {item_id} missing {key} path {value}")

          stale_patterns = [
              r"dotnet\s+(run|build|test|restore)\b",
              r"docker\s+(build|run|compose)\b",
              r"powershell\s+-NoProfile\b",
              r"pwsh\s+-File\s+scripts[\\/]",
              r"scripts[\\/][^\s`]+",
              r"src[\\/]Incursa\.",
              r"\.artifacts[\\/]",
              r"localhost\b",
              r"127\.0\.0\.1\b",
          ]
          stale_re = re.compile("|".join(f"(?:{p})" for p in stale_patterns), re.IGNORECASE)
          scan_roots = [
              root / "README.md",
              root / "docs",
              root / "specs",
              root / "schemas",
              root / "fixtures",
              root / "scenarios",
              root / "suites",
              root / "load-profiles",
          ]
          for scan_root in scan_roots:
              paths = [scan_root] if scan_root.is_file() else scan_root.rglob("*")
              for path in paths:
                  if not path.is_file() or path.suffix.lower() not in {".md", ".json", ".yaml", ".yml"}:
                      continue
                  for line_no, line in enumerate(path.read_text(encoding="utf-8").splitlines(), start=1):
                      if stale_re.search(line):
                          errors.append(f"{rel(path)}:{line_no}: stale implementation command or path")

          if errors:
              for error in errors:
                  print(error)
              sys.exit(1)
          print("Repository health checks passed.")
          PY
