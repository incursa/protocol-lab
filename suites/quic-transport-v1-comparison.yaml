id: quic-transport-v1-comparison
name: ProtocolLab raw QUIC transport comparison suite
description: Documentation/input suite for package-backed quic.transport comparison coverage. Multiplexing and duplex scenarios are load-validated; additional raw QUIC cells remain out of scope until validator and artifact gates exist.
loadProfileId: local-comparison
targetMode: process
targetNetworkMode: published-port
implementations:
  []
scenarios:
  - quic.transport.multiplex.100x64kb
  - quic.transport.duplex-streams
protocol: quic
loadTools:
  - id: quic-go-raw-load
    mode: process
    category: managed-lab
defaults:
  durationSeconds: 30
  warmupSeconds: 10
  repetitions: 3
  connections: 32
  streamsPerConnection: 16
counterCapture:
  enabledByDefault: false
  tool: dotnet-counters
notes: Raw QUIC comparison input for package-backed jobs. Implementation selection is resolved from submitted implementation packages or private catalog overlays, not public production adapter manifests.
