schemaVersion: "1.0"
id: quic.transport.duplex-streams
title: QUIC Duplex Streams
name: QUIC Duplex Streams
family: quic.transport
description: Validate simultaneous bidirectional QUIC stream payload transfer as a transport scenario independent of HTTP/3 application semantics.
status: stable
kind: protocolValidation
layer: transport
protocol: quic
roles:
  - server
requires:
  capabilities:
    - quic.server
  protocols:
    - quic
  roles:
    - server
trafficShape: bidirectional-stream
implementationRole: server
requiredCapabilities:
  - quicTransport
  - quicStreams
  - quicDuplex
quicTransport:
  behavior: duplex-streams
  connectionCount: 1
  streamType: bidirectional
  streamCount: 16
  payloadSizeBytes: 65536
  payloadDirection: bidirectional
  openPattern: concurrent
  expectedBytes: 2097152
validation:
  required: true
  checks:
    - quic-transport-metrics
    - bytes-sent-received-match-expected
    - completed-streams-match-expected
    - zero-timeouts-and-errors
    - bidirectional-payloads-complete
    - protocol:quic
benchmark:
  warmupSeconds: 5
  durationSeconds: 30
  repetitions: 1
  connections:
    - 1
  streamsPerConnection:
    - 16
benchmarkCompat:
  compatibleLoadShapes:
    - quic-stream
    - smoke
    - regression
    - comparison
  primaryMetrics:
    - bytesPerSecond
    - streamsPerSecond
    - streamDurationP95
    - errorRate
artifacts:
  required:
    - validation.json
    - result.json
  optional:
    - protocol-diagnostic-artifact
    - counters
networkProfile: clean
requiredMetrics:
  - quic.stream.bytesSent
  - quic.stream.bytesReceived
  - quic.stream.completedStreams
artifactRequirements:
  - load-generator.stdout.txt
  - load-generator.stderr.txt
  - protocol-diagnostic-unavailable-note
tags:
  - phase6
  - quic
  - duplex
