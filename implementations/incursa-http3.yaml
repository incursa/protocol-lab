id: incursa-http3
name: Incursa HTTP/3
description: Incursa HTTP/3 endpoint target implemented by the ProtocolLab adapter project for direct process and Docker execution.
image: incursa/protocol-lab-incursa-http3-bench-server:local
targetKind: process
executable: dotnet
project: src/Incursa.ProtocolLab.Adapters.IncursaHttp3/Incursa.ProtocolLab.Adapters.IncursaHttp3.csproj
workingDirectory: .
dockerfile: src/Incursa.ProtocolLab.Adapters.IncursaHttp3/Dockerfile
buildContext: .
containerName: protocol-lab-incursa-http3
dockerNetworkMode: published-port
baseUrl: https://localhost:5444
protocolBaseUrls:
  h3: https://localhost:5444
dockerBaseUrl: https://127.0.0.1:5444
dockerProtocolBaseUrls:
  h3: https://127.0.0.1:5444
certificateMode: loopback-self-signed-certificate
roles:
  - server
supportedProtocols:
  - h3
supportedWorkloadFamilies:
  - http.application
ports:
  - name: https-h3
    containerPort: 5444
    hostPort: 5444
    protocol: udp
environment:
  PROTOCOL_LAB_IMPLEMENTATION: incursa-http3
  PROTOCOL_LAB_INCURSA_MODE: endpoint
  PROTOCOL_LAB_H3_PORT: "5444"
dockerEnvironment:
  PROTOCOL_LAB_IMPLEMENTATION: incursa-http3
  PROTOCOL_LAB_INCURSA_MODE: endpoint
  PROTOCOL_LAB_H3_PORT: "5444"
commandArguments:
  - --mode
  - endpoint
  - --port
  - "5444"
dockerCommandArguments:
  - --mode
  - endpoint
  - --port
  - "5444"
readinessCheck:
  type: http
  url: /plaintext
  timeoutSeconds: 30
shutdownBehavior: process-exit
capabilities:
  - httpPlaintext
  - httpJson
  - httpStatus
  - httpBytes
  - httpStreaming
  - httpUpload
  - httpHeaders
artifactExports:
  - server.stdout.txt
  - server.stderr.txt
qlogSupport: false
sslKeyLogSupport: false
notes: Direct Incursa HTTP/3 endpoint target implemented by the ProtocolLab adapter project. The endpoint speaks HTTP/3 over UDP on 5444, serves the public HTTP application scenarios in the catalog, and uses a runtime-generated loopback self-signed certificate for local-only proof. It does not depend on a sibling endpoint project.

