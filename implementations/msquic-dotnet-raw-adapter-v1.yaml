id: msquic-dotnet-raw-adapter-v1
name: MSQuic/.NET Raw QUIC Adapter v1
description: Process-backed ProtocolLab Adapter Contract v1 control plane for the MSQuic/.NET System.Net.Quic raw QUIC server.
image: ""
targetKind: process
targetContract: adapter-v1
executable: dotnet
project: src/Incursa.ProtocolLab.Adapters.MsQuicDotNet/Incursa.ProtocolLab.Adapters.MsQuicDotNet.csproj
workingDirectory: .
dockerfile: ""
buildContext: .
containerName: ""
dockerNetwork: ""
dockerNetworkMode: published-port
dockerBaseUrl: http://127.0.0.1:53381
baseUrl: http://127.0.0.1:53381
adapterControlPlaneBaseUrl: http://127.0.0.1:53381
certificateMode: none
roles:
  - server
supportedProtocols:
  - quic
supportedWorkloadFamilies:
  - fixture.quic
  - quic.transport
ports:
  - name: control-plane
    containerPort: 53381
    hostPort: 53381
    protocol: tcp
environment:
  ASPNETCORE_URLS: http://127.0.0.1:53381
dockerEnvironment: {}
commandArguments: []
readinessCheck:
  type: http
  url: /protocol-lab/adapter/v1/health
  timeoutSeconds: 10
shutdownBehavior: process-exit
capabilities:
  - quicTransport
  - quicHandshake
  - quicStreams
  - quicMultiplexing
  - quicDuplex
artifactExports:
  - server.stdout.txt
  - server.stderr.txt
  - server.log.txt
qlogSupport: false
sslKeyLogSupport: false
notes: Process-backed adapter control plane for an in-process MSQuic/.NET raw QUIC server using System.Net.Quic. The control plane is HTTP/1.1 JSON. The returned protocol endpoint is a QUIC/UDP endpoint. Supports handshake, bidirectional echo, and bidirectional bulk scenarios. Requires platform with msquic support (Windows 11+, Linux with libmsquic).
