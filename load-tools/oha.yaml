# Load Tool Contract v1
schemaVersion: protocol-lab.load-tool.v1

id: oha
title: oha HTTP Load Generator
name: oha
description: Modern HTTP load generator used as the preferred Phase 2B local baseline tool.
kind: process
category: external-reference

supports:
  protocols:
    - h1
    - h2
  trafficShapes:
    - request-response
  roles:
    - client

metrics:
  primary:
    - requestsPerSecond
    - latencyP50
    - latencyP95
    - latencyP99
    - latencyMean
    - throughputBytesPerSecond
    - errorRate
  secondary:
    - latencyP75
    - latencyP90
    - latencyP999
    - latencyMin
    - latencyMax

execution:
  process:
    executable: oha
    defaultArguments:
      - --output-format
      - json
    versionCommand:
      - --version
    availabilityCheck: path
  docker:
    image: ghcr.io/hatoo/oha:latest
    commandTemplate:
      - oha
      - --http-version
      - "3"
      - "{url}"

parser:
  type: oha-json
  id: oha-json
  preservesRawOutput: true

artifacts:
  required:
    - load.stdout.log
    - load.stderr.log
  optional:
    - load.metrics.json

purposes:
  - benchmark
  - profile

limitations:
  - HTTP/3 execution deferred until command and network contracts are proven
  - Does not support streamsPerConnection as a separate concept
  - Results are concurrency-style measurements

# Legacy fields
supportedProtocols:
  - h1
  - h2
supportedScenarioFamilies:
  - http.application
executable: oha
dockerImage: ghcr.io/hatoo/oha:latest
defaultArguments:
  - --output-format
  - json
versionCommand:
  - --version
availabilityCheck: path
outputParserId: oha-json
notes: Process mode is supported when oha is on PATH. HTTP/3 and Docker execution remain deferred until their command and network contracts are proven.
