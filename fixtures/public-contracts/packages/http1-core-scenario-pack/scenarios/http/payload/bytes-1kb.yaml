schemaVersion: "1.0"
title: HTTP Bytes 1KB
status: stable
kind: workload
layer: application
roles:
  - server
requires:
  capabilities:
    - http.server
  protocols:
    - h1
  roles:
    - server
trafficShape: download
id: http.payload.bytes.1kb
name: HTTP Bytes 1KB
family: http.application
description: Validate a deterministic 1KB byte payload downloaded from an HTTP/1 server endpoint.
protocol: h1
implementationRole: server
requiredCapabilities:
  - httpBytes
endpoint:
  method: GET
  path: /bytes/1024
  query: {}
  requestHeaders: {}
  requestBodyGeneration: none
  expectedStatus: 200
  expectedHeaders:
    content-type: application/octet-stream
  expectedBodyRule: deterministicBytes
  expectedBodySize: 1024
validation:
  required: true
  checks:
    - status
    - content-type
    - body-size
    - deterministic-bytes
  http:
    expectedStatus: 200
    expectedBody: <deterministicBytes>
benchmarkCompat:
  compatibleLoadShapes:
    - fixed-path-request-response
    - smoke
  primaryMetrics:
    - requestsPerSecond
    - latencyP50
    - latencyP95
    - latencyP99
    - errorRate
    - bytesReceived
artifacts:
  required:
    - validation.json
    - result.json
    - load-tool.stdout.txt
    - load-tool.stderr.txt
  optional:
    - response-sample.bin
    - counters
networkProfile: clean
requiredMetrics:
  - requestsPerSecond
  - bytesReceived
artifactRequirements:
  - load-tool.stdout.txt
  - load-tool.stderr.txt
tags:
  - http
  - h1
  - payload
