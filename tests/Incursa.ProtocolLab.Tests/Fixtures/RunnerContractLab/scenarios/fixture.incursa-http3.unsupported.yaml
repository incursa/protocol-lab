id: fixture.incursa-http3.unsupported
name: Fixture Incursa HTTP/3 Unsupported
family: fixture.incursa-http3
version: 1.0
description: Models an Incursa HTTP/3 scenario that the adapter reports as unsupported.
protocol: h3
implementationRole: server
requiredCapabilities:
  - httpPlaintext
endpoint:
  method: GET
  path: /unsupported
  query: {}
  requestHeaders: {}
  expectedStatus: 200
  expectedBodyRule: exact
  expectedBody: unsupported
validation:
  required: true
  checks:
    - status
benchmark:
  warmupSeconds: 0
  durationSeconds: 1
  repetitions: 1
  connections:
    - 1
  streamsPerConnection:
    - 1
networkProfile: clean
requiredMetrics:
  - requestsPerSecond
artifactRequirements:
  - result.json
  - validation.json
tags:
  - fixture
  - incursa-http3
  - adapter
  - unsupported
