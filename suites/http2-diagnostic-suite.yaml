id: http2-diagnostic-suite
name: ProtocolLab HTTP/2 diagnostic suite
description: Profile-specific HTTP/2 application selector for the diagnostic load profile.
purpose: diagnostic
resultKind: diagnostic
loadProfileId: http2-diagnostic
scenarios:
  - http2.core.plaintext
  - http2.core.json
  - http2.streaming.response
protocol: h2
defaults:
  durationSeconds: 10
  warmupSeconds: 1
  repetitions: 1
  connections: 1
  streamsPerConnection: 8
counterCapture:
  enabledByDefault: true
  tool: ""
notes: This suite selects existing public HTTP/2 scenarios with the protocol-specific http2-diagnostic load profile; it does not imply a required runner or load generator.
tags:
  - http2
  - diagnostic
