id: http1-diagnostic-suite
name: ProtocolLab HTTP/1 diagnostic suite
description: Profile-specific HTTP/1 application selector for the diagnostic load profile.
purpose: diagnostic
resultKind: diagnostic
loadProfileId: http1-diagnostic
scenarios:
  - http1.core.plaintext
  - http1.core.json
  - http1.payload.bytes.1kb
protocol: h1
defaults:
  durationSeconds: 10
  warmupSeconds: 1
  repetitions: 1
  connections: 1
  streamsPerConnection: 8
counterCapture:
  enabledByDefault: true
  tool: ""
notes: This suite selects existing public HTTP/1 scenarios with the protocol-specific http1-diagnostic load profile; it does not imply a required runner or load generator.
tags:
  - http1
  - diagnostic
