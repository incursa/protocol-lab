schemaVersion: "1.0"
title: HTTP Stream 100x16KB
status: stable
kind: workload
layer: application
roles:
  - server
requires:
  capabilities:
    - http.server
  protocols:
    - h1
    - h2
    - h3
  roles:
    - server
trafficShape: streaming-download
id: http.payload.stream.100x16kb
name: HTTP Stream 100x16KB
family: http.application
description: Validate and benchmark streaming 100 deterministic chunks of 16KB.
protocol: h3
implementationRole: server
requiredCapabilities:
  - httpStreaming
endpoint:
  method: GET
  path: /stream/bytes
  query:
    chunks: "100"
    size: "16384"
    delayMs: "0"
  requestHeaders: {}
  expectedStatus: 200
  expectedHeaders:
    content-type: application/octet-stream
  expectedBodyRule: byteCount
  expectedBodySize: 1638400
validation:
  required: true
  checks: [status, content-type, body-size]
http:
  expectedStatus: 200
  expectedBody: <byteCount>
benchmark:
  warmupSeconds: 5
  durationSeconds: 30
  repetitions: 1
  connections: [1]
  streamsPerConnection: [1]
benchmarkCompat:
  compatibleLoadShapes:
    - fixed-path-request-response
  primaryMetrics:
    - requestsPerSecond
    - latencyP50
    - latencyP95
    - latencyP99
    - errorRate
artifacts:
  required:
    - validation.json
    - result.json
  optional:
    - protocol-diagnostic-artifact
    - counters
networkProfile: clean
requiredMetrics: [requestsPerSecond, bytesReceived]
artifactRequirements: [load-generator.stdout.txt, load-generator.stderr.txt]
tags: [phase2, http, streaming]
