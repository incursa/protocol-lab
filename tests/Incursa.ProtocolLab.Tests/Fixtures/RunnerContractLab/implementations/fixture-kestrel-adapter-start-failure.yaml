id: fixture-kestrel-adapter-start-failure
name: Fixture Kestrel Adapter Start Failure
description: Fixture adapter-backed Kestrel target that intentionally points the adapter at a missing benchmark server project.
image: ""
targetKind: process
targetContract: adapter-v1
executable: dotnet
project: ../../../../src/Incursa.ProtocolLab.Adapters.Kestrel/Incursa.ProtocolLab.Adapters.Kestrel.csproj
workingDirectory: .
dockerfile: ""
buildContext: .
containerName: ""
dockerNetwork: ""
dockerNetworkMode: published-port
dockerBaseUrl: http://127.0.0.1:53171
baseUrl: http://127.0.0.1:53171
adapterControlPlaneBaseUrl: http://127.0.0.1:53171
certificateMode: none
roles:
  - server
supportedProtocols:
  - h1
  - h2
  - h3
supportedWorkloadFamilies:
  - fixture.kestrel
ports:
  - name: control-plane
    containerPort: 53171
    hostPort: 53171
    protocol: tcp
environment:
  ASPNETCORE_URLS: http://127.0.0.1:53171
  PROTOCOL_LAB_KESTREL_BENCHMARK_PROJECT_PATH: servers/KestrelBenchServer/DefinitelyMissing.csproj
  PROTOCOL_LAB_KESTREL_READINESS_TIMEOUT_SECONDS: "2"
  PROTOCOL_LAB_KESTREL_HTTP_TIMEOUT_SECONDS: "5"
dockerEnvironment: {}
commandArguments: []
readinessCheck:
  type: http
  url: /protocol-lab/adapter/v1/health
  timeoutSeconds: 10
shutdownBehavior: process-exit
capabilities:
  - httpPlaintext
  - httpJson
  - httpStatus
  - httpBytes
  - httpStreaming
  - httpUpload
  - httpHeaders
artifactExports:
  - server.stdout.txt
  - server.stderr.txt
qlogSupport: false
sslKeyLogSupport: false
notes: Fixture-only start-failure target. The control plane starts, but the adapter cannot launch its protocol endpoint because the benchmark server project path is invalid.
