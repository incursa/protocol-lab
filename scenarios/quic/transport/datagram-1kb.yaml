schemaVersion: "1.0"
id: quic.transport.datagram.1kb
title: QUIC Datagram 1KB
name: QUIC Datagram 1KB
family: quic.transport
description: Validate 1KB QUIC datagram payload delivery for implementations that explicitly advertise QUIC datagram support.
status: experimental
kind: protocolValidation
layer: transport
protocol: quic
roles:
  - server
requires:
  capabilities:
    - quic.server
    - quic.datagram
  protocols:
    - quic
  roles:
    - server
trafficShape: datagram
implementationRole: server
requiredCapabilities:
  - quicTransport
  - quicDatagram
quicTransport:
  behavior: datagram-echo
  connectionCount: 1
  datagramCount: 16
  datagramBytes: 1024
  payloadDirection: bidirectional
  expectedBytes: 32768
validation:
  required: true
  checks:
    - datagram-payloads-delivered
    - datagram-bytes-match-expected
    - zero-timeouts-and-errors
    - protocol:quic
benchmark:
  warmupSeconds: 5
  durationSeconds: 30
  repetitions: 1
  connections:
    - 1
  streamsPerConnection:
    - 0
benchmarkCompat:
  compatibleLoadShapes:
    - quic-datagram
    - smoke
    - regression
  primaryMetrics:
    - datagramsPerSecond
    - bytesPerSecond
    - datagramLossRate
    - errorRate
artifacts:
  required:
    - validation.json
    - result.json
  optional:
    - protocol-diagnostic-artifact
    - counters
networkProfile: clean
requiredMetrics:
  - quic.datagram.sentCount
  - quic.datagram.receivedCount
  - quic.datagram.bytesReceived
artifactRequirements:
  - load-generator.stdout.txt
  - load-generator.stderr.txt
  - protocol-diagnostic-artifact
tags:
  - phase6
  - quic
  - datagram
  - experimental
