schemaVersion: "1.0"
id: http.core.json
title: HTTP JSON
name: HTTP JSON
family: http.application
description: Validate a fixed small JSON HTTP response over an HTTP/1 server endpoint.
status: stable
kind: workload
layer: application
protocol: h1
roles:
  - server
requires:
  capabilities:
    - http.server
    - httpJson
  protocols:
    - h1
  roles:
    - server
trafficShape: request-response
implementationRole: server
requiredCapabilities:
  - httpJson
endpoint:
  method: GET
  path: /json
  query: {}
  requestHeaders: {}
  requestBodyGeneration: none
  expectedStatus: 200
  expectedHeaders:
    content-type: application/json
  expectedBodyRule: jsonEquivalent
  expectedBody: '{"message":"Hello, World!"}'
  expectedJsonProperties:
    message: Hello, World!
  expectedJsonKeys:
    - message
validation:
  required: true
  checks:
    - status
    - content-type
    - json-body
    - json-equivalent
    - json-property:message
  http:
    expectedStatus: 200
    expectedBody: '{"message":"Hello, World!"}'
benchmarkCompat:
  compatibleLoadShapes:
    - fixed-path-request-response
    - smoke
  primaryMetrics:
    - requestsPerSecond
    - latencyP50
    - latencyP95
    - latencyP99
    - errorRate
artifacts:
  required:
    - validation.json
    - result.json
    - load-tool.stdout.txt
    - load-tool.stderr.txt
  optional:
    - response-body.json
    - counters
networkProfile: clean
requiredMetrics:
  - requestsPerSecond
artifactRequirements:
  - load-tool.stdout.txt
  - load-tool.stderr.txt
tags:
  - http
  - h1
  - core
  - json
