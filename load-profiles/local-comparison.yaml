# Load Profile Contract v1
schemaVersion: protocol-lab.load-profile.v1

id: local-comparison
title: Local Comparison
status: stable
purpose: comparison

description: >
  A repeatable local comparison profile intended for shared-host
  development and regression evidence. Not suitable for publishable
  benchmark claims.

durationSeconds: 30
warmupSeconds: 10
cooldownSeconds: 5
repetitions: 3

http:
  connections: 128
  concurrency: 128
  requestTimeoutSeconds: 10

http2:
  connections: 128
  concurrency: 128
  streamsPerConnection: 100
  requestTimeoutSeconds: 10

http3:
  connections: 128
  concurrency: 128
  streamsPerConnection: 100
  requestTimeoutSeconds: 10

quic:
  connections: 32
  streamsPerConnection: 16
  streamBytes: 1024
  connectionTimeoutSeconds: 10
  idleTimeoutSeconds: 10

evidence:
  minimumTier: local-comparison
  publishable: false

artifacts:
  required:
    - load.stdout.log
    - load.stderr.log
    - result.json
  optional:
    - counters
    - docker.stats.jsonl
