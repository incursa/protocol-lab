id: fixture-http-success
name: Fixture HTTP Success
description: Dummy process-backed HTTP target for runner contract coverage.
image: ""
targetKind: process
executable: powershell
project: ""
workingDirectory: .
dockerfile: ""
buildContext: .
containerName: ""
dockerNetwork: ""
dockerNetworkMode: published-port
dockerBaseUrl: http://127.0.0.1:51881
baseUrl: http://127.0.0.1:51881
certificateMode: none
roles:
  - server
supportedProtocols:
  - h1
supportedWorkloadFamilies:
  - fixture.http
ports:
  - name: http
    containerPort: 51881
    hostPort: 51881
    protocol: tcp
environment: {}
dockerEnvironment: {}
commandArguments:
  - -NoProfile
  - -ExecutionPolicy
  - Bypass
  - -File
  - scripts/fixture-http-server.ps1
  - -Port
  - "51881"
  - -Body
  - fixture-ok
readinessCheck:
  type: http
  url: /ok
  timeoutSeconds: 10
shutdownBehavior: process-exit
capabilities:
  - fixtureHttp
artifactExports:
  - server.stdout.txt
  - server.stderr.txt
qlogSupport: false
sslKeyLogSupport: false
notes: Fixture-only success target.
