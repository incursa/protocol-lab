id: fixture-incursa-raw-quic-adapter-v1
name: Fixture Incursa Raw QUIC Adapter v1
description: Deterministic adapter-backed Incursa raw QUIC target for runner contract tests.
image: ""
targetKind: process
targetContract: adapter-v1
executable: dotnet
project: ../../../../src/Incursa.ProtocolLab.Adapters.IncursaRawQuic/Incursa.ProtocolLab.Adapters.IncursaRawQuic.csproj
workingDirectory: .
dockerfile: ""
buildContext: .
containerName: ""
dockerNetwork: ""
dockerNetworkMode: published-port
dockerBaseUrl: http://127.0.0.1:53591
baseUrl: http://127.0.0.1:53591
adapterControlPlaneBaseUrl: http://127.0.0.1:53591
certificateMode: none
roles:
  - server
supportedProtocols:
  - quic
supportedWorkloadFamilies:
  - fixture.quic
ports:
  - name: control-plane
    containerPort: 53591
    hostPort: 53591
    protocol: tcp
environment:
  ASPNETCORE_URLS: http://127.0.0.1:53591
  PROTOCOL_LAB_INCURSA_RAW_QUIC_READINESS_TIMEOUT_SECONDS: "10"
  PROTOCOL_LAB_INCURSA_RAW_QUIC_HTTP_TIMEOUT_SECONDS: "5"
dockerEnvironment: {}
commandArguments: []
readinessCheck:
  type: http
  url: /protocol-lab/adapter/v1/health
  timeoutSeconds: 10
shutdownBehavior: process-exit
capabilities:
  - quicTransport
  - quicHandshake
  - quicStreams
artifactExports:
  - server.stdout.txt
  - server.stderr.txt
qlogSupport: false
sslKeyLogSupport: false
notes: Fixture-backed Incursa raw QUIC adapter control plane. Launches the IncursaRawQuicServer as a child process. QUIC/UDP only.
