id: nginx-http3
name: nginx HTTP/3
description: Optional Docker-only nginx HTTP/3 target using a repo-owned image with explicit nginx -V HTTP/3 module proof.
image: incursa/protocol-lab-nginx-bench-server:local
targetKind: docker
dockerfile: servers/nginx/Dockerfile
buildContext: servers/nginx
dockerNetworkMode: published-port
dockerBaseUrl: https://localhost:5446
dockerProtocolBaseUrls:
  h3: https://localhost:5446
baseUrl: https://localhost:5446
protocolBaseUrls:
  h3: https://localhost:5446
certificateMode: nginx-self-signed-localhost-loopback-certificate
roles:
  - server
supportedProtocols:
  - h3
supportedWorkloadFamilies:
  - http.application
ports:
  - name: https-h3
    containerPort: 8446
    hostPort: 5446
    protocol: tcp+udp
environment:
  PROTOCOL_LAB_IMPLEMENTATION: nginx-http3
dockerEnvironment:
  PROTOCOL_LAB_IMPLEMENTATION: nginx-http3
targetDockerResourceLimits:
  notes: Optional CLI target limits are translated into docker run --cpus/--memory/--memory-swap/--cpuset-cpus/--pids-limit flags for this target.
targetCapabilityProof:
  id: nginx-http3-module
  required: true
  dockerExecArguments:
    - nginx
    - -V
  expectedOutputContains: --with-http_v3_module
commandArguments:
  - nginx
  - -g
  - daemon off;
dockerCommandArguments:
  - nginx
  - -g
  - daemon off;
readinessCheck:
  type: http
  url: /plaintext
  timeoutSeconds: 30
  startupDelayMilliseconds: 1000
shutdownBehavior: docker-stop
capabilities:
  - httpPlaintext
  - httpJson
artifactExports:
  - target.stdout.txt
  - target.stderr.txt
  - target-docker-command.txt
  - target-docker-inspect.json
  - target-execution.json
  - target-docker-stats.raw.txt
  - target-docker-stats.jsonl
  - target-docker-metrics-summary.json
  - validation.json
  - protocol-proof.json
  - result.json
  - h2load.stdout.txt
  - h2load.stderr.txt
  - h2load-output.json
  - qlog/
qlogSupport: false
sslKeyLogSupport: false
notes: Docker-only optional nginx HTTP/3 target for local Phase 3H evidence. The entrypoint and runner require nginx -V to include --with_http_v3_module or --with-http_v3_module before readiness. The container generates a short-lived self-signed localhost certificate at runtime. Shared-network h2load keeps localhost SNI and uses --connect-to nginx-http3:8446. Results are local Docker evidence and not publishable.
