id: quic-diagnostic-suite
name: ProtocolLab QUIC diagnostic suite
description: Profile-specific QUIC transport selector for the diagnostic load profile.
purpose: diagnostic
resultKind: diagnostic
loadProfileId: quic-diagnostic
scenarios:
  - quic.transport.multiplex.100x64kb
  - quic.transport.stream-churn
  - quic.transport.datagram.1kb
protocol: quic
defaults:
  durationSeconds: 10
  warmupSeconds: 1
  repetitions: 1
  connections: 1
  streamsPerConnection: 16
counterCapture:
  enabledByDefault: true
  tool: ""
notes: This suite selects existing public QUIC scenarios with the protocol-specific quic-diagnostic load profile; it does not imply a required runner or load generator.
tags:
  - quic
  - diagnostic
