id: h3-local-v1-docker-target-shared-network-limited
name: ProtocolLab local HTTP/3 Docker target shared-network resource-limited smoke suite
description: Documentation/input suite for local HTTP/3 Docker target acceptance with example Docker CPU and memory limits for target and h2load containers.
targetMode: docker
targetNetworkMode: shared-docker-network
implementations:
  - kestrel-http3
  - incursa-http3
scenarios:
  - http.core.plaintext
  - http.core.json
protocol: h3
loadTools:
  - id: h2load
    mode: docker
    category: external-reference
defaults:
  durationSeconds: 5
  warmupSeconds: 1
  repetitions: 1
  connections: 16
  streamsPerConnection: 10
dockerResourceLimits:
  target:
    cpus: "2"
    memory: 1g
  loadTool:
    cpus: "2"
    memory: 1g
counterCapture:
  enabledByDefault: false
  tool: dotnet-counters
loadToolMetrics:
  captureDockerStats: true
  intervalSeconds: 1
notes: Resource limits and load-generator Docker stats improve local repeatability and diagnostics but remain Docker Desktop/local-machine controls; this suite is not publishable benchmark evidence.
