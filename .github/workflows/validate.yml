                      capacity = dns_load.get("connections", 0) * dns_load.get("outstandingQueries", 0)
                      if dns_load.get("concurrency", 0) > capacity:
                          errors.append(f"{rel(path)}: DNS concurrency exceeds connection/outstanding-query capacity")
                  if isinstance(data.get("websocket"), dict) and data["websocket"].get("concurrency", 0) > data["websocket"].get("connections", 0):
                      errors.append(f"{rel(path)}: WebSocket concurrency cannot exceed allocated connections")
              load_profile_id = data.get("id")
              if load_profile_id in load_profile_ids:
                  errors.append(f"{rel(path)}: duplicate load profile id {load_profile_id} also in {rel(load_profile_ids[load_profile_id])}")
              load_profile_ids[load_profile_id] = path

          valid_fixture_validators = [
              (root / "fixtures" / "public-contracts" / "suites" / "valid", suite_validator, "suite fixture"),
