schemaVersion: "1.0"
id: http3.payload.stream.100x16kb
title: HTTP/3 Stream 100x16KB
name: HTTP/3 Stream 100x16KB
family: http.application
description: Validate and benchmark streaming 100 deterministic chunks of 16KB.
status: stable
kind: workload
layer: application
protocol: h3
roles:
  - server
requires:
  capabilities:
    - http.server
  protocols:
    - h3
  roles:
    - server
trafficShape: streaming-download
implementationRole: server
requiredCapabilities:
  - httpStreaming
endpoint:
  method: GET
  path: /stream/bytes
  query:
    chunks: '100'
    size: '16384'
    delayMs: '0'
  requestHeaders: {}
  expectedStatus: 200
  expectedHeaders:
    content-type: application/octet-stream
  expectedBodyRule: byteCount
  expectedBodySize: 1638400
validation:
  required: true
  checks:
    - status
    - content-type
    - body-size
    - protocol:h3
  http:
    expectedStatus: 200
    expectedProtocol: h3
    expectedBody: <byteCount>
benchmark:
  warmupSeconds: 5
  durationSeconds: 30
  repetitions: 1
  connections:
    - 1
  streamsPerConnection:
    - 1
benchmarkCompat:
  compatibleLoadShapes:
    - fixed-path-request-response
  primaryMetrics:
    - requestsPerSecond
    - latencyP50
    - latencyP95
    - latencyP99
    - errorRate
artifacts:
  required:
    - validation.json
    - result.json
  optional:
    - protocol-diagnostic-artifact
    - counters
networkProfile: clean
requiredMetrics:
  - requestsPerSecond
  - bytesReceived
artifactRequirements:
  - load-generator.stdout.txt
  - load-generator.stderr.txt
tags:
  - phase2
  - http
  - h3
  - http3
  - streaming
