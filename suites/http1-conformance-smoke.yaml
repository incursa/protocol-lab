id: http1-conformance-smoke
name: ProtocolLab HTTP/1 conformance smoke suite
description: Fast package-neutral behavior validation for the HTTP/1 core plaintext, JSON, and 1KB payload scenarios.
purpose: conformance
resultKind: conformance
loadProfileId: smoke
scenarios:
  - http1.core.plaintext
  - http1.core.json
  - http1.payload.bytes.1kb
protocol: h1
defaults:
  durationSeconds: 5
  warmupSeconds: 1
  repetitions: 1
  connections: 1
  streamsPerConnection: 1
counterCapture:
  enabledByDefault: false
  tool: resource-summary
notes: Package-neutral conformance selector. A slow valid run is still behavior-valid; performance claims belong to benchmark suites.
