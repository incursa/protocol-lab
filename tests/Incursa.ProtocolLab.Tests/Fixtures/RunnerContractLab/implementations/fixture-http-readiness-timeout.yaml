id: fixture-http-readiness-timeout
name: Fixture HTTP Readiness Timeout
description: Dummy process-backed target that stays alive but never serves the readiness endpoint.
image: ""
targetKind: process
executable: powershell
project: ""
workingDirectory: .
dockerfile: ""
buildContext: .
containerName: ""
dockerNetwork: ""
dockerNetworkMode: published-port
dockerBaseUrl: http://127.0.0.1:51882
baseUrl: http://127.0.0.1:51882
certificateMode: none
roles:
  - server
supportedProtocols:
  - h1
supportedWorkloadFamilies:
  - fixture.http
ports:
  - name: http
    containerPort: 51882
    hostPort: 51882
    protocol: tcp
environment: {}
dockerEnvironment: {}
commandArguments:
  - -NoProfile
  - -ExecutionPolicy
  - Bypass
  - -File
  - scripts/fixture-http-sleeper.ps1
  - -Seconds
  - "30"
readinessCheck:
  type: http
  url: /ok
  timeoutSeconds: 1
shutdownBehavior: process-exit
capabilities:
  - fixtureHttp
artifactExports:
  - server.stdout.txt
  - server.stderr.txt
qlogSupport: false
sslKeyLogSupport: false
notes: Fixture-only readiness timeout target.
