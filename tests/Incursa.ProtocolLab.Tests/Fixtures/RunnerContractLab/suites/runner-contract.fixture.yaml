id: runner-contract-fixture
name: Runner Contract Fixture Suite
description: Fixture lab suite that groups the dummy runner contract scenarios.
targetMode: process
targetNetworkMode: published-port
implementations:
  - fixture-http-success
  - fixture-http-readiness-timeout
  - fixture-http-unsupported
  - fixture-http-h3-target
  - fixture-http-startup-failure
scenarios:
  - fixture.http.success
  - fixture.http.validation-fail
  - fixture.http.h3-contract
  - fixture.http.incompatible-profile
protocol: h1
loadTools:
  - id: fixture-load-success
    mode: process
    category: managed-lab
  - id: fixture-load-parsefail
    mode: process
    category: managed-lab
  - id: fixture-load-fail
    mode: process
    category: managed-lab
defaults:
  durationSeconds: 1
  warmupSeconds: 0
  repetitions: 1
  connections: 1
  streamsPerConnection: 1
counterCapture:
  enabledByDefault: false
  tool: dotnet-counters
notes: Fixture-only suite definition. The production runner does not consume suite files yet, but the fixture lab documents the intended contract surface.
