id: quic-go-http3
name: quic-go HTTP/3
description: Go-based quic-go HTTP/3 Docker benchmark target for ProtocolLab local comparisons.
image: incursa/protocol-lab-quic-go-bench-server:local
targetKind: docker
executable: go
workingDirectory: src/Incursa.ProtocolLab.Adapters.QuicGo
dockerfile: src/Incursa.ProtocolLab.Adapters.QuicGo/Dockerfile
buildContext: src/Incursa.ProtocolLab.Adapters.QuicGo
dockerNetworkMode: published-port
dockerBaseUrl: https://127.0.0.1:5447
dockerProtocolBaseUrls:
  h3: https://127.0.0.1:5447
baseUrl: https://127.0.0.1:5447
protocolBaseUrls:
  h3: https://127.0.0.1:5447
certificateMode: quic-go-self-signed-loopback-certificate
roles:
  - server
supportedProtocols:
  - h3
supportedWorkloadFamilies:
  - http.application
ports:
  - name: https-h3
    containerPort: 8443
    hostPort: 5447
    protocol: tcp+udp
environment:
  PROTOCOL_LAB_IMPLEMENTATION: quic-go-http3
  PROTOCOL_LAB_QUIC_GO_ADDR: 127.0.0.1:5447
dockerEnvironment:
  PROTOCOL_LAB_IMPLEMENTATION: quic-go-http3
commandArguments:
  - run
  - ./cmd/quic-go-http3
dockerCommandArguments: []
readinessCheck:
  type: http
  url: /plaintext
  timeoutSeconds: 30
  startupDelayMilliseconds: 1000
shutdownBehavior: docker-stop
capabilities:
  - httpPlaintext
  - httpJson
  - httpStatus
  - httpBytes
  - httpStreaming
  - httpUpload
  - httpHeaders
artifactExports:
  - server.stdout.txt
  - server.stderr.txt
qlogSupport: false
sslKeyLogSupport: false
notes: Go-based quic-go HTTP/3 Docker target. The server lives in src/Incursa.ProtocolLab.Adapters.QuicGo, generates a runtime self-signed localhost certificate, and serves the HTTP/3 endpoints used by the expanded local comparison suite across core, header, payload, and upload scenarios.
