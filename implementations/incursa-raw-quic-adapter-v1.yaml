id: incursa-raw-quic-adapter-v1
name: Incursa Raw QUIC Adapter v1
description: Process-backed ProtocolLab Adapter Contract v1 control plane for the Incursa raw QUIC server.
image: ""
targetKind: process
targetContract: adapter-v1
executable: dotnet
project: src/Incursa.ProtocolLab.Adapters.IncursaRawQuic/Incursa.ProtocolLab.Adapters.IncursaRawQuic.csproj
workingDirectory: .
dockerfile: ""
buildContext: .
containerName: ""
dockerNetwork: ""
dockerNetworkMode: published-port
dockerBaseUrl: http://127.0.0.1:53591
baseUrl: http://127.0.0.1:53591
adapterControlPlaneBaseUrl: http://127.0.0.1:53591
certificateMode: none
roles:
  - server
supportedProtocols:
  - quic
supportedWorkloadFamilies:
  - fixture.quic
ports:
  - name: control-plane
    containerPort: 53591
    hostPort: 53591
    protocol: tcp
environment:
  ASPNETCORE_URLS: http://127.0.0.1:53591
dockerEnvironment: {}
commandArguments: []
readinessCheck:
  type: http
  url: /protocol-lab/adapter/v1/health
  timeoutSeconds: 10
shutdownBehavior: process-exit
capabilities:
  - quicTransport
  - quicHandshake
  - quicStreams
artifactExports:
  - server.stdout.txt
  - server.stderr.txt
qlogSupport: false
sslKeyLogSupport: false
notes: Process-backed adapter control plane for the Incursa raw QUIC server (servers/IncursaRawQuicServer). Launches the IncursaRawQuicServer as a child process. The control plane is HTTP/1.1 JSON. The returned protocol endpoint is a QUIC/UDP endpoint. Supports handshake, bidirectional echo, and bidirectional bulk scenarios.
