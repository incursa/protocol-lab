id: h3-local-v1-docker-target
name: ProtocolLab local HTTP/3 Docker target acceptance suite
description: Documentation/input suite for local HTTP/3 Docker target acceptance.
targetMode: docker
targetNetworkMode: published-port
implementations:
  - kestrel-http3
  - incursa-http3
scenarios:
  - http.core.plaintext
  - http.core.json
protocol: h3
loadTools:
  - id: managed-httpclient-h3-load
    mode: managed
    category: managed-lab
  - id: h2load
    mode: docker
    category: external-reference
defaults:
  durationSeconds: 5
  warmupSeconds: 1
  repetitions: 1
  connections: 16
  streamsPerConnection: 10
counterCapture:
  enabledByDefault: false
  tool: dotnet-counters
notes: Docker target mode uses host-published ports. Host validation calls https://127.0.0.1:5443 for Kestrel and https://127.0.0.1:5444 for Incursa. Docker h2load reaches those targets through host.docker.internal rewriting. Build the Kestrel target image with scripts/build/Build-KestrelBenchServerImage.ps1 and the Incursa target image with scripts/build/Build-IncursaHttp3BenchServerImage.ps1 before running the suite.
