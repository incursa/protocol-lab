id: h3-large-body-v1
name: ProtocolLab package-backed HTTP/3 large body suite
description: Narrow package-backed HTTP/3 suite for deterministic 64KB and 1MB payload download validation.
loadProfileId: smoke
targetMode: process
implementations:
  []
scenarios:
  - http.payload.bytes.64kb
  - http.payload.bytes.1mb
protocol: h3
loadTools:
  - id: managed-httpclient-h3-load
    mode: managed
    category: managed-lab
defaults:
  durationSeconds: 5
  warmupSeconds: 1
  repetitions: 1
  connections: 1
  streamsPerConnection: 1
counterCapture:
  enabledByDefault: false
  tool: dotnet-counters
notes: Package-backed smoke input for HTTP/3 large-body completion proof. Results from this suite are lab evidence and are not public benchmark claims.
