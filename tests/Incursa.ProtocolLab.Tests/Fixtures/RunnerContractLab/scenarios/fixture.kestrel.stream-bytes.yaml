id: fixture.kestrel.stream-bytes
name: Fixture Kestrel Stream Bytes
family: fixture.kestrel
version: 1.0
description: Validates the streaming byte endpoint.
protocol: h1
implementationRole: server
requiredCapabilities:
  - httpStreaming
endpoint:
  method: GET
  path: /stream/bytes
  query:
    chunks: "2"
    size: "8"
    delayMs: "0"
  requestHeaders: {}
  expectedStatus: 200
  expectedHeaders:
    content-type: application/octet-stream
  expectedBodyRule: deterministicBytes
  expectedBodySize: 16
validation:
  required: true
  checks:
    - status
    - content-type
    - body-size
    - deterministic-bytes
benchmark:
  warmupSeconds: 0
  durationSeconds: 1
  repetitions: 1
  connections:
    - 1
  streamsPerConnection:
    - 1
networkProfile: clean
requiredMetrics:
  - requestsPerSecond
  - bytesReceived
artifactRequirements:
  - result.json
  - validation.json
tags:
  - fixture
  - kestrel
  - adapter
