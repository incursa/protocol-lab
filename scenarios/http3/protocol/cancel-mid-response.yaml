schemaVersion: "1.0"
id: http3.protocol.cancel-mid-response
title: HTTP/3 Cancel Mid Response
name: HTTP/3 Cancel Mid Response
family: http3.protocol
description: Validate HTTP/3 request-stream cancellation behavior with an observable reset after a partial response.
status: stable
kind: protocolValidation
layer: protocol
protocol: h3
roles:
  - server
requires:
  capabilities:
    - h3.server
    - quic.server
  protocols:
    - h3
  roles:
    - server
trafficShape: bidirectional-stream
implementationRole: server
requiredCapabilities:
  - h3Protocol
  - h3StreamCancellation
h3Protocol:
  behavior: cancel-mid-response
  requestPath: /stream/bytes
  cancellationPoint: after-response-bytes
  responseBytesBeforeCancel: 65536
  expectedFrameTypes:
    - headers
    - data
    - reset-stream
validation:
  required: true
  checks:
    - reset-stream-observable
    - response-bytes-before-cancel-observed
    - protocol:h3
benchmark:
  warmupSeconds: 5
  durationSeconds: 30
  repetitions: 1
  connections:
    - 1
  streamsPerConnection:
    - 1
benchmarkCompat:
  compatibleLoadShapes:
    - fixed-path-request-response
  primaryMetrics:
    - requestsPerSecond
    - latencyP50
    - latencyP95
    - latencyP99
    - errorRate
artifacts:
  required:
    - validation.json
    - result.json
  optional:
    - protocol-diagnostic-artifact
    - counters
networkProfile: clean
requiredMetrics:
  - h3.stream.resetCount
  - h3.stream.bytesBeforeCancel
artifactRequirements:
  - load-generator.stdout.txt
  - load-generator.stderr.txt
  - protocol-diagnostic-artifact
tags:
  - phase5
  - http
  - h3
  - http3
  - protocol
  - cancellation
