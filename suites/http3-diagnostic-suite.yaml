id: http3-diagnostic-suite
name: ProtocolLab HTTP/3 diagnostic suite
description: Profile-specific HTTP/3 application and protocol selector for the diagnostic load profile.
purpose: diagnostic
resultKind: diagnostic
loadProfileId: http3-diagnostic
scenarios:
  - http3.protocol.qpack-repeated-headers
  - http3.protocol.multiplex-100-streams
  - http3.protocol.cancel-mid-response
protocol: h3
defaults:
  durationSeconds: 10
  warmupSeconds: 1
  repetitions: 1
  connections: 1
  streamsPerConnection: 8
counterCapture:
  enabledByDefault: true
  tool: ""
notes: This suite selects existing public HTTP/3 scenarios with the protocol-specific http3-diagnostic load profile; it does not imply a required runner or load generator.
tags:
  - http3
  - diagnostic
