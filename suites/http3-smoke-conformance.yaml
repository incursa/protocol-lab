id: http3-smoke-conformance
name: ProtocolLab HTTP/3 smoke conformance suite
description: Profile-specific HTTP/3 application and protocol selector for the smoke load profile.
purpose: conformance
resultKind: conformance
loadProfileId: http3-smoke
scenarios:
  - http3.core.status
  - http3.payload.bytes.1kb
  - http3.payload.bytes.64kb
  - http3.upload.echo.64kb
protocol: h3
defaults:
  durationSeconds: 5
  warmupSeconds: 1
  repetitions: 1
  connections: 1
  streamsPerConnection: 1
counterCapture:
  enabledByDefault: false
  tool: ""
notes: This suite selects existing public HTTP/3 scenarios with the protocol-specific http3-smoke load profile; it does not imply a required runner or load generator.
tags:
  - http3
  - smoke
  - conformance
