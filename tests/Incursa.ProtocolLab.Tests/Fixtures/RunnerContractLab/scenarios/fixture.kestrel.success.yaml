id: fixture.kestrel.success
name: Fixture Kestrel Success
family: fixture.kestrel
version: 1.0
description: Validates the adapter-backed success path against the plaintext Kestrel endpoint.
protocol: h1
implementationRole: server
requiredCapabilities:
  - httpPlaintext
endpoint:
  method: GET
  path: /plaintext
  query: {}
  requestHeaders: {}
  expectedStatus: 200
  expectedHeaders:
    content-type: text/plain
  expectedBodyRule: exact
  expectedBody: Hello, World!
  expectedBodySize: 13
validation:
  required: true
  checks:
    - status
    - content-type
    - body
benchmark:
  warmupSeconds: 0
  durationSeconds: 1
  repetitions: 1
  connections:
    - 1
  streamsPerConnection:
    - 1
networkProfile: clean
requiredMetrics:
  - requestsPerSecond
artifactRequirements:
  - result.json
  - validation.json
tags:
  - fixture
  - kestrel
  - adapter
